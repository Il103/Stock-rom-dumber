name: HyperOS ROM Dumper (DumprX -> Multi Upload)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (used exactly as entered)"
        required: true
        type: string
      target_branch:
        description: "Branch to push files (auto = generate from dump info)"
        required: false
        default: "auto"
        type: string
      device_name:
        description: "Device codename fallback"
        required: false
        default: "unknown"
        type: string
      extract_contents:
        description: "Try extracting filesystem contents from images"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      compress_images:
        description: "Compress .img to .img.xz before push"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_gitlab:
        description: "Upload to GitLab"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_gitea:
        description: "Upload to Gitea/Codeberg"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_sourceforge:
        description: "Upload to SourceForge"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_r2:
        description: "Upload to Cloudflare R2"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk
        run: |
          set -e
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git git-lfs curl jq file rsync unzip tar zip \
            python3 python3-pip xz-utils p7zip-full unrar sharutils cabextract \
            brotli liblz4-tool gawk detox cpio rename \
            device-tree-compiler \
            android-sdk-libsparse-utils e2fsprogs e2tools erofs-utils \
            awscli openssh-client

          if ! command -v uv >/dev/null 2>&1; then
            curl -fsSL https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate URL
        id: input
        run: |
          set -e
          URL='${{ inputs.rom_url }}'
          [ -n "$URL" ] || { echo "ERROR: rom_url is empty"; exit 1; }
          echo "$URL" | grep -qE '^https?://' || { echo "ERROR: rom_url must start with http/https"; exit 1; }
          echo "rom_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL exactly: $URL"

      - name: Clone DumprX
        run: |
          set -e
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX

      - name: Run DumprX with exact URL
        run: |
          set +e
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          export TERM=xterm

          ./dumper.sh '${{ steps.input.outputs.rom_url }}'
          code=$?

          if [ "$code" -ne 0 ]; then
            if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
              echo "DumprX returned non-zero but output exists. Continuing."
            else
              echo "DumprX failed and no output found."
              exit "$code"
            fi
          fi

      - name: Collect output
        run: |
          set -e
          mkdir -p /tmp/final_dump
          [ -d /tmp/DumprX/out ] || { echo "ERROR: /tmp/DumprX/out missing"; exit 1; }
          rsync -a /tmp/DumprX/out/ /tmp/final_dump/

          {
            echo "rom_url=${{ steps.input.outputs.rom_url }}"
            echo "target_branch_input=${{ inputs.target_branch }}"
            echo "device_name_input=${{ inputs.device_name }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "dumped_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > /tmp/final_dump/_dump_info.txt

      - name: Resolve target branch
        id: branch
        run: |
          set -e
          sanitize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//'
          }

          input='${{ inputs.target_branch }}'
          if [ -n "$input" ] && [ "$input" != "auto" ]; then
            out=$(sanitize "$input")
          else
            readme=/tmp/final_dump/README.md
            brand=$(awk -F': ' '/^- Brand:/{print $2; exit}' "$readme" 2>/dev/null || true)
            code=$(awk -F': ' '/^- Codename:/{print $2; exit}' "$readme" 2>/dev/null || true)
            incr=$(awk -F': ' '/^- Incremental:/{print $2; exit}' "$readme" 2>/dev/null || true)
            [ -n "$brand" ] || brand=stock
            [ -n "$code" ] || code='${{ inputs.device_name }}'
            out=$(sanitize "dump-$brand-$code-$incr")
          fi

          [ -n "$out" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"
          [ "$out" != "main" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"

          echo "target_branch=$out" >> "$GITHUB_OUTPUT"
          echo "target_branch_resolved=$out" >> /tmp/final_dump/_dump_info.txt
          echo "Resolved branch: $out"

      - name: Recovery fallback from vendor_boot
        run: |
          set -e
          if ! find /tmp/final_dump -type f -iname 'recovery.img' | grep -q .; then
            vb=$(find /tmp/final_dump -type f -iname 'vendor_boot*.img' | head -n1 || true)
            if [ -n "$vb" ] && [ -f "$vb" ]; then
              cp "$vb" /tmp/final_dump/recovery_from_vendor_boot.img
              echo "recovery_fallback=vendor_boot" >> /tmp/final_dump/_dump_info.txt
              echo "recovery_source_file=$(basename "$vb")" >> /tmp/final_dump/_dump_info.txt
            fi
          fi

      - name: Optional compress images
        if: inputs.compress_images == 'true'
        run: |
          set -e
          find /tmp/final_dump -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            xz -T0 -6 "$img"
          done

      - name: Optional extract image contents
        if: inputs.extract_contents == 'true'
        run: |
          set -e
          mkdir -p /tmp/final_dump/extracted
          find /tmp/final_dump -maxdepth 2 -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            name=$(basename "$img" .img)
            out=/tmp/final_dump/extracted/$name
            mkdir -p "$out"

            if debugfs -R "rdump / $out" "$img" >/dev/null 2>&1; then
              continue
            fi

            loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
            if [ -n "$loop" ]; then
              mnt=/tmp/mnt_$name
              mkdir -p "$mnt"
              if sudo mount -o ro "$loop" "$mnt" 2>/dev/null; then
                sudo rsync -a "$mnt/" "$out/" || true
                sudo umount "$mnt" 2>/dev/null || true
              fi
              sudo losetup -d "$loop" 2>/dev/null || true
            fi

            sudo chown -R "$USER:$USER" "$out" 2>/dev/null || true
          done

      - name: Push to target branch on GitHub (smart)
        run: |
          set -e
          BRANCH='${{ steps.branch.outputs.target_branch }}'
          [ -n "$BRANCH" ] || { echo "ERROR: target branch empty"; exit 1; }
          [ "$BRANCH" != "main" ] || { echo "ERROR: target branch cannot be main"; exit 1; }

          git lfs install
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 1048576000
          git config --global core.compression 0
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git fetch origin
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout --orphan "$BRANCH"
          fi

          # Branch root only.
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a /tmp/final_dump/ ./

          # Skip oversized APKs and print skipped names.
          rm -f /tmp/skipped_apk_report.txt
          find . -type f -name '*.apk' -size +100M -print0 | while IFS= read -r -d '' apk; do
            echo "SKIPPED (>100MB APK): $apk" | tee -a /tmp/skipped_apk_report.txt
            rm -f "$apk"
          done
          [ -f /tmp/skipped_apk_report.txt ] && cat /tmp/skipped_apk_report.txt >> ./_dump_info.txt || true

          # Track large files with LFS.
          find . -type f -size +50M ! -path './.git/*' -print0 | while IFS= read -r -d '' f; do
            ext="${f##*.}"
            git lfs track "*.$ext" 2>/dev/null || true
          done

          # Generate SHA256 checksums.
          find . -maxdepth 3 -type f ! -path './.git/*' ! -name '*.sha256' -name '*.img' -print0 | while IFS= read -r -d '' f; do
            sha256sum "$f" > "$f.sha256" 2>/dev/null || true
          done

          # Generate file list.
          find . -type f ! -path './.git/*' | sort > ./file_list.txt || true

          git add -A
          git diff --cached --quiet && { echo "Nothing to commit"; exit 0; }
          git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d')]"

          pushed=0
          for attempt in 1 2 3; do
            if git push origin "$BRANCH"; then
              pushed=1
              break
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep 10
          done
          [ "$pushed" -eq 1 ] || { echo "ERROR: GitHub push failed after retries"; exit 1; }

          echo "github_upload=success" >> /tmp/final_dump/_dump_info.txt

      - name: Mirror to GitLab
        if: inputs.upload_gitlab == 'true'
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
        run: |
          set -e
          [ -z "$GITLAB_TOKEN" ] && echo "GITLAB_TOKEN not set, skipping." && exit 0
          [ -z "$GITLAB_USERNAME" ] && echo "GITLAB_USERNAME not set, skipping." && exit 0
          [ -z "$GITLAB_REPO" ] && echo "GITLAB_REPO not set, skipping." && exit 0

          BRANCH='${{ steps.branch.outputs.target_branch }}'
          REMOTE="https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@gitlab.com/${GITLAB_USERNAME}/${GITLAB_REPO}.git"

          rm -rf /tmp/gl_push
          mkdir -p /tmp/gl_push
          rsync -a /tmp/final_dump/ /tmp/gl_push/
          cd /tmp/gl_push

          git init -b "$BRANCH"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git lfs install

          find . -type f -size +50M ! -path './.git/*' -print0 | while IFS= read -r -d '' f; do
            ext="${f##*.}"
            git lfs track "*.$ext" 2>/dev/null || true
          done

          git add -A
          git commit -m "dump: $BRANCH [auto]" || echo "Nothing to commit"
          git remote add origin "$REMOTE"
          git push --force origin "$BRANCH" || {
            echo "WARNING: GitLab push failed. Continuing."
            exit 0
          }

          echo "gitlab_upload=success" >> /tmp/final_dump/_dump_info.txt

      - name: Mirror to Gitea / Codeberg
        if: inputs.upload_gitea == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_REPO: ${{ secrets.GITEA_REPO }}
          GITEA_URL: ${{ secrets.GITEA_URL }}
        run: |
          set -e
          [ -z "$GITEA_TOKEN" ] && echo "GITEA_TOKEN not set, skipping." && exit 0
          [ -z "$GITEA_USERNAME" ] && echo "GITEA_USERNAME not set, skipping." && exit 0
          [ -z "$GITEA_REPO" ] && echo "GITEA_REPO not set, skipping." && exit 0

          BRANCH='${{ steps.branch.outputs.target_branch }}'
          BASE_URL="${GITEA_URL:-https://codeberg.org}"
          BASE_HOST="${BASE_URL#*://}"
          AUTH_REMOTE="https://${GITEA_USERNAME}:${GITEA_TOKEN}@${BASE_HOST}/${GITEA_USERNAME}/${GITEA_REPO}.git"

          rm -rf /tmp/gt_push
          mkdir -p /tmp/gt_push
          rsync -a /tmp/final_dump/ /tmp/gt_push/
          cd /tmp/gt_push

          git init -b "$BRANCH"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git lfs install

          find . -type f -size +50M ! -path './.git/*' -print0 | while IFS= read -r -d '' f; do
            ext="${f##*.}"
            git lfs track "*.$ext" 2>/dev/null || true
          done

          git add -A
          git commit -m "dump: $BRANCH [auto]" || echo "Nothing to commit"
          git remote add origin "$AUTH_REMOTE"
          git push --force origin "$BRANCH" || {
            echo "WARNING: Gitea push failed. Continuing."
            exit 0
          }

          echo "gitea_upload=success" >> /tmp/final_dump/_dump_info.txt

      - name: Upload to SourceForge (rsync over SSH)
        if: inputs.upload_sourceforge == 'true'
        env:
          SF_USER: ${{ secrets.SF_USER }}
          SF_PROJECT: ${{ secrets.SF_PROJECT }}
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          set -e
          [ -z "$SF_USER" ] && echo "SF_USER not set, skipping." && exit 0
          [ -z "$SF_PROJECT" ] && echo "SF_PROJECT not set, skipping." && exit 0
          [ -z "$SF_SSH_KEY" ] && echo "SF_SSH_KEY not set, skipping." && exit 0

          BRANCH='${{ steps.branch.outputs.target_branch }}'

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SF_SSH_KEY" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null || true

          SF_PATH="/home/frs/project/${SF_PROJECT}/${BRANCH}/"
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no" \
            /tmp/final_dump/ \
            "${SF_USER}@frs.sourceforge.net:${SF_PATH}" || {
            echo "WARNING: SourceForge upload failed. Continuing."
            rm -f ~/.ssh/sf_key
            exit 0
          }

          rm -f ~/.ssh/sf_key
          echo "sourceforge_upload=success" >> /tmp/final_dump/_dump_info.txt

      - name: Upload to Cloudflare R2 (S3-compatible)
        if: inputs.upload_r2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -e
          [ -z "$R2_ACCESS_KEY_ID" ] && echo "R2_ACCESS_KEY_ID not set, skipping." && exit 0
          [ -z "$R2_SECRET_ACCESS_KEY" ] && echo "R2_SECRET_ACCESS_KEY not set, skipping." && exit 0
          [ -z "$R2_BUCKET" ] && echo "R2_BUCKET not set, skipping." && exit 0
          [ -z "$R2_ENDPOINT" ] && echo "R2_ENDPOINT not set, skipping." && exit 0

          BRANCH='${{ steps.branch.outputs.target_branch }}'

          AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
          aws s3 sync /tmp/final_dump/ "s3://${R2_BUCKET}/${BRANCH}/" \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress \
            --only-show-errors || {
            echo "WARNING: R2 upload failed. Continuing."
            exit 0
          }

          echo "r2_upload=success" >> /tmp/final_dump/_dump_info.txt
