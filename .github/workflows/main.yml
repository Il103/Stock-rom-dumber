name: Stock ROM Dumper (DumprX -> Multi Upload)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (used exactly as entered)"
        required: true
        type: string
      target_branch:
        description: "Branch to push files (auto = generate from dump info)"
        required: false
        default: "auto"
        type: string
      device_name:
        description: "Device codename fallback"
        required: false
        default: "unknown"
        type: string
      dump_engine:
        description: "Dump engine (default: dumprx)"
        required: false
        default: "dumprx"
        type: choice
        options: ["dumprx", "payload_dumper_go", "raw_archive_extract"]
      extract_contents:
        description: "Try extracting filesystem contents from images"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      compress_images:
        description: "Compress .img to .img.xz before push"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_github_branch:
        description: "Upload to this repo smart branch"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      upload_gitlab:
        description: "Upload to GitLab"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_gitea:
        description: "Upload to Gitea/Codeberg"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_sourceforge:
        description: "Upload to SourceForge"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_r2:
        description: "Upload to Cloudflare R2"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      gitlab_max_file_size_mb:
        description: "GitLab upload: drop files larger than this size in MB"
        required: false
        default: "1024"
        type: string
      gitlab_exclude_files:
        description: "GitLab upload: space-separated file globs to skip"
        required: false
        default: "userdata.img super.img"
        type: string
      gitlab_quota_soft_fail:
        description: "Do not fail workflow if GitLab quota is exceeded"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk
        run: |
          set -e
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git git-lfs curl jq file rsync unzip tar zip \
            python3 python3-pip xz-utils p7zip-full sharutils cabextract \
            brotli liblz4-tool gawk detox cpio rename \
            device-tree-compiler e2fsprogs openssh-client \
            build-essential pkg-config liblzma-dev libzstd-dev

          optional_pkgs=(
            unrar
            android-sdk-libsparse-utils
            e2tools
            erofs-utils
          )

          for pkg in "${optional_pkgs[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y --no-install-recommends "$pkg" || true
            else
              echo "Optional package not available on this runner: $pkg"
            fi
          done

      - name: Validate URL
        id: input
        run: |
          set -e
          URL='${{ inputs.rom_url }}'
          [ -n "$URL" ] || { echo "ERROR: rom_url is empty"; exit 1; }
          echo "$URL" | grep -qE '^https?://' || { echo "ERROR: rom_url must start with http/https"; exit 1; }
          echo "rom_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL exactly: $URL"

      - name: Select dump engine
        id: engine
        run: |
          set -e
          engine='${{ inputs.dump_engine }}'
          case "$engine" in
            dumprx|payload_dumper_go|raw_archive_extract) ;;
            *) echo "ERROR: unsupported dump engine: $engine"; exit 1 ;;
          esac
          echo "name=$engine" >> "$GITHUB_OUTPUT"
          echo "Selected dump engine: $engine"

      - name: Clone DumprX
        if: steps.engine.outputs.name == 'dumprx'
        run: |
          set -e
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX

      - name: Run DumprX with exact URL
        if: steps.engine.outputs.name == 'dumprx'
        run: |
          set +e
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          export TERM=xterm

          ./dumper.sh '${{ steps.input.outputs.rom_url }}'
          code=$?
          if [ "$code" -ne 0 ]; then
            if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
              echo "DumprX returned non-zero but output exists. Continuing."
            else
              echo "DumprX failed and no output found."
              exit "$code"
            fi
          fi

      - name: Run payload-dumper-go
        if: steps.engine.outputs.name == 'payload_dumper_go'
        run: |
          set -e
          URL='${{ steps.input.outputs.rom_url }}'

          mkdir -p /tmp/payload_work /tmp/tool_out
          cd /tmp/payload_work

          curl -fL --retry 3 --retry-delay 3 "$URL" -o input.bin
          mime="$(file -b --mime-type input.bin)"
          echo "Downloaded mime type: $mime"
          case "$mime" in
            text/html|text/plain)
              echo "ERROR: URL returned text/html, not firmware file"
              exit 1
              ;;
          esac

          payload=""
          magic="$(xxd -p -l 4 input.bin 2>/dev/null || true)"
          if [ "$magic" = "43724155" ]; then
            payload="/tmp/payload_work/input.bin"
          else
            mkdir -p /tmp/payload_work/unpack
            # Try nested decompression/extraction for links serving gzip/tar wrappers.
            inner="/tmp/payload_work/input.bin"
            if gzip -t /tmp/payload_work/input.bin >/dev/null 2>&1; then
              echo "Detected gzip wrapper, decompressing..."
              gzip -dc /tmp/payload_work/input.bin > /tmp/payload_work/input.dec 2>/dev/null || true
              [ -s /tmp/payload_work/input.dec ] && inner="/tmp/payload_work/input.dec"
            fi

            tar -xf "$inner" -C /tmp/payload_work/unpack >/tmp/payload_work/unpack.log 2>&1 || true
            7z x -y "$inner" -o/tmp/payload_work/unpack >>/tmp/payload_work/unpack.log 2>&1 || true
            7z x -y /tmp/payload_work/input.bin -o/tmp/payload_work/unpack >>/tmp/payload_work/unpack.log 2>&1 || true

            payload="$(find /tmp/payload_work/unpack -type f -iname 'payload.bin' | head -n1 || true)"

            # Some packages store payload as payload.bin.gz.
            if [ -z "$payload" ]; then
              payload_gz="$(find /tmp/payload_work/unpack -type f -iname 'payload.bin.gz' | head -n1 || true)"
              if [ -n "$payload_gz" ]; then
                gzip -dc "$payload_gz" > /tmp/payload_work/payload.bin
                payload="/tmp/payload_work/payload.bin"
              fi
            fi
          fi

          if [ -z "$payload" ]; then
            echo "payload.bin not found, trying raw partition extraction from archive contents."
            find /tmp/payload_work/unpack -type f \( \
              -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname '*.elf' -o \
              -iname 'super.img*' -o -iname '*scatter*.txt' \
            \) -print0 | while IFS= read -r -d '' f; do
              cp -f "$f" /tmp/tool_out/ 2>/dev/null || true
            done

            raw_count="$(find /tmp/tool_out -type f \( -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname 'super.img*' \) | wc -l)"
            if [ "$raw_count" -gt 0 ]; then
              echo "Raw partition fallback extracted $raw_count files."
              exit 0
            fi

            # Do not fail here. A dedicated fallback step will try DumprX.
            echo "No payload/raw files found in payload-dumper-go mode."
            exit 0
          fi

          if ! command -v go >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends golang-go
          fi

          export PATH="$(go env GOPATH)/bin:$PATH"
          go install github.com/ssut/payload-dumper-go@latest

          cd /tmp/tool_out
          payload-dumper-go "$payload" || echo "payload-dumper-go failed. Will try DumprX fallback in next step."

      - name: Fallback to DumprX when selected engine has no output
        if: steps.engine.outputs.name != 'dumprx'
        run: |
          set -e

          # If alternate engine produced usable output, skip fallback.
          if find /tmp/tool_out -type f \( -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname 'payload.bin' -o -iname 'super.img*' \) | grep -q .; then
            echo "Alternate engine output exists. DumprX fallback not needed."
            exit 0
          fi

          echo "No usable output from selected engine. Running DumprX fallback..."
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          export TERM=xterm
          ./dumper.sh '${{ steps.input.outputs.rom_url }}' || true

          if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
            rsync -a /tmp/DumprX/out/ /tmp/tool_out/
            echo "DumprX fallback succeeded."
          else
            echo "ERROR: No output from selected engine and DumprX fallback failed."
            exit 1
          fi

      - name: Run raw archive extractor
        if: steps.engine.outputs.name == 'raw_archive_extract'
        run: |
          set -e
          URL='${{ steps.input.outputs.rom_url }}'

          mkdir -p /tmp/raw_work /tmp/tool_out
          cd /tmp/raw_work

          curl -fL --retry 3 --retry-delay 3 "$URL" -o input.bin
          mime="$(file -b --mime-type input.bin)"
          echo "Downloaded mime type: $mime"
          case "$mime" in
            text/html|text/plain)
              echo "ERROR: URL returned text/html, not firmware file"
              exit 1
              ;;
          esac

          mkdir -p /tmp/raw_work/unpack
          7z x -y input.bin -o/tmp/raw_work/unpack >/tmp/raw_work/unpack.log 2>&1 || {
            echo "ERROR: archive extract failed"
            tail -n 60 /tmp/raw_work/unpack.log || true
            exit 1
          }

          find /tmp/raw_work/unpack -type f \( \
            -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname '*.elf' -o \
            -iname 'payload.bin' -o -iname 'super.img*' -o -iname '*scatter*.txt' \
          \) -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" /tmp/tool_out/ 2>/dev/null || true
          done

      - name: Fallback unpack for Infinix/Transsion archives
        if: steps.engine.outputs.name == 'dumprx'
        run: |
          set -e

          # If DumprX already produced files, skip fallback.
          if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
            echo "DumprX output exists. Fallback not needed."
            exit 0
          fi

          archive="$(find /tmp/DumprX/input -maxdepth 1 -type f \( -iname '*.rar' -o -iname '*.zip' -o -iname '*.7z' -o -name 'download' \) | head -n1 || true)"
          if [ -z "$archive" ]; then
            echo "No archive found in /tmp/DumprX/input for fallback."
            exit 0
          fi

          echo "Fallback archive detected: $archive"
          mime="$(file -b --mime-type "$archive" 2>/dev/null || echo unknown)"
          echo "Detected mime type: $mime"

          case "$mime" in
            text/html|text/plain)
              echo "Fallback skipped: downloaded file is not firmware archive (likely HTML page/link shortener)."
              exit 0
              ;;
          esac

          rm -rf /tmp/manual_extract
          mkdir -p /tmp/manual_extract /tmp/DumprX/out

          # Try extracting archive with 7z first.
          if ! 7z x -y "$archive" -o/tmp/manual_extract >/tmp/manual_extract.log 2>&1; then
            echo "Fallback extraction failed. Last lines:"
            tail -n 40 /tmp/manual_extract.log || true
            exit 0
          fi

          # Copy known dump artifacts to DumprX out directory.
          find /tmp/manual_extract -type f \( \
            -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname '*.elf' -o \
            -iname 'payload.bin' -o -iname 'super.img*' -o -iname '*scatter*.txt' \
          \) -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" /tmp/DumprX/out/ 2>/dev/null || true
          done

          usable_count="$(find /tmp/DumprX/out -maxdepth 1 -type f \( -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname 'payload.bin' -o -iname 'super.img*' \) | wc -l)"
          if [ "$usable_count" -gt 0 ]; then
            {
              echo "# Manual fallback output"
              echo "- Source archive: $(basename "$archive")"
              echo "- Note: DumprX parser failed, raw extracted files copied."
            } > /tmp/DumprX/out/README.md
            echo "Fallback extraction created output files."
          else
            echo "Fallback extraction found no usable partition files."
          fi

      - name: Resolve output directory
        id: outdir
        run: |
          set -e
          case '${{ steps.engine.outputs.name }}' in
            dumprx) echo "path=/tmp/DumprX/out" >> "$GITHUB_OUTPUT" ;;
            payload_dumper_go|raw_archive_extract) echo "path=/tmp/tool_out" >> "$GITHUB_OUTPUT" ;;
            *) echo "ERROR: invalid engine output"; exit 1 ;;
          esac

      - name: Collect output
        run: |
          set -e
          OUT_DIR='${{ steps.outdir.outputs.path }}'
          mkdir -p /tmp/final_dump
          [ -d "$OUT_DIR" ] || { echo "ERROR: output directory missing: $OUT_DIR"; exit 1; }
          rsync -a "$OUT_DIR"/ /tmp/final_dump/

          # Fail fast if no real partition payload was produced.
          find /tmp/final_dump -type f \( -iname '*.img' -o -iname '*.bin' -o -iname '*.mbn' -o -iname 'payload.bin' -o -iname 'super.img*' \) | grep -q . || {
            echo "ERROR: No usable partition files were produced."
            echo "Hint: The ROM URL is likely not a direct firmware file (DumprX downloaded HTML/placeholder), or format is unsupported/encrypted."
            exit 1
          }

          {
            echo "rom_url=${{ steps.input.outputs.rom_url }}"
            echo "dump_engine=${{ steps.engine.outputs.name }}"
            echo "target_branch_input=${{ inputs.target_branch }}"
            echo "device_name_input=${{ inputs.device_name }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "dumped_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > /tmp/final_dump/_dump_info.txt

      - name: Resolve target branch
        id: branch
        run: |
          set -e
          sanitize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//'
          }

          input='${{ inputs.target_branch }}'
          if [ -n "$input" ] && [ "$input" != "auto" ]; then
            out=$(sanitize "$input")
          else
            readme=/tmp/final_dump/README.md
            brand=$(awk -F': ' '/^- Brand:/{print $2; exit}' "$readme" 2>/dev/null || true)
            code=$(awk -F': ' '/^- Codename:/{print $2; exit}' "$readme" 2>/dev/null || true)
            incr=$(awk -F': ' '/^- Incremental:/{print $2; exit}' "$readme" 2>/dev/null || true)
            [ -n "$brand" ] || brand=stock
            [ -n "$code" ] || code='${{ inputs.device_name }}'
            out=$(sanitize "dump-$brand-$code-$incr")
          fi

          [ -n "$out" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"
          [ "$out" != "main" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"

          echo "target_branch=$out" >> "$GITHUB_OUTPUT"
          echo "target_branch_resolved=$out" >> /tmp/final_dump/_dump_info.txt
          echo "Resolved branch: $out"

      - name: Recovery fallback from vendor_boot
        run: |
          set -e
          if ! find /tmp/final_dump -type f -iname 'recovery.img' | grep -q .; then
            vb=$(find /tmp/final_dump -type f -iname 'vendor_boot*.img' | head -n1 || true)
            if [ -n "$vb" ] && [ -f "$vb" ]; then
              cp "$vb" /tmp/final_dump/recovery_from_vendor_boot.img
              echo "recovery_fallback=vendor_boot" >> /tmp/final_dump/_dump_info.txt
              echo "recovery_source_file=$(basename "$vb")" >> /tmp/final_dump/_dump_info.txt
            fi
          fi

      - name: Optional compress images
        if: inputs.compress_images == 'true'
        run: |
          set -e
          find /tmp/final_dump -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            xz -T0 -6 "$img"
          done

      - name: Optional extract image contents
        if: inputs.extract_contents == 'true'
        run: |
          set -e
          mkdir -p /tmp/final_dump/extracted
          find /tmp/final_dump -maxdepth 2 -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            name=$(basename "$img" .img)
            out=/tmp/final_dump/extracted/$name
            mkdir -p "$out"

            if command -v debugfs >/dev/null 2>&1; then
              if debugfs -R "rdump / $out" "$img" >/dev/null 2>&1; then
                continue
              fi
            fi
          done || true

      - name: Push to target branch (smart)
        if: inputs.upload_github_branch == 'true'
        run: |
          set -e
          BRANCH="${{ steps.branch.outputs.target_branch }}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find /tmp/final_dump -type f -name '*.apk' -size +100M -delete 2>/dev/null || true
          git lfs install --skip-smudge || true
          git lfs track "*.img" "*.bin" "*.elf" "*.mbn" "payload.bin" "super.img*" || true

          REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "$REMOTE_URL" "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH" --depth=1
            git checkout "$BRANCH"
          else
            git checkout --orphan "$BRANCH"
            git rm -rf . --quiet 2>/dev/null || true
          fi

          rsync -a --exclude='.git' /tmp/final_dump/ ./
          find . -not -path './.git/*' -type f | sort > file_list.txt
          find . -not -path './.git/*' -type f -exec sha256sum {} \; > checksums.sha256

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            ok=false
            for i in 1 2 3; do
              if git push "$REMOTE_URL" "$BRANCH"; then
                ok=true
                break
              fi
              echo "GitHub push attempt $i failed, retrying..."
              sleep 5
            done
            [ "$ok" = true ] || { echo "ERROR: GitHub upload failed after retries"; exit 1; }
          fi

      - name: GitHub upload disabled
        if: inputs.upload_github_branch != 'true'
        run: echo "GitHub branch upload is disabled. Skipping."

      - name: Mirror to GitLab
        if: inputs.upload_gitlab == 'true'
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
          GITLAB_PROJECT_PATH: ${{ secrets.GITLAB_PROJECT_PATH }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          set -e

          GL_TOKEN="${GITLAB_TOKEN:-}"
          GL_USER="${GITLAB_USERNAME:-}"
          GL_REPO="${GITLAB_REPO:-}"
          GL_PROJECT_PATH="${GITLAB_PROJECT_PATH:-}"
          GL_REPO_URL="${GITLAB_REPO_URL:-}"

          [ -n "$GL_TOKEN" ] || { echo "ERROR: Missing secret GITLAB_TOKEN"; exit 1; }

          # Guard against placeholder values like ${GL_USER} accidentally stored in Secrets.
          for v in "$GL_USER" "$GL_REPO" "$GL_PROJECT_PATH" "$GL_REPO_URL"; do
            case "$v" in
              *'${'*|*'}'*|*'$%'* )
                echo "ERROR: Found placeholder-like text in GitLab secrets."
                echo "Set real values only, e.g. mkpromvp or mkpromvp/Stock_room_dumb"
                exit 1
                ;;
            esac
          done

          if [ -n "$GL_REPO_URL" ]; then
            REPO_URL="$GL_REPO_URL"
          elif [ -n "$GL_PROJECT_PATH" ]; then
            REPO_URL="https://gitlab.com/${GL_PROJECT_PATH}.git"
          else
            [ -n "$GL_USER" ] || { echo "ERROR: Missing secret GITLAB_USERNAME"; exit 1; }
            [ -n "$GL_REPO" ] || { echo "ERROR: Missing secret GITLAB_REPO"; exit 1; }
            REPO_URL="https://gitlab.com/${GL_USER}/${GL_REPO}.git"
          fi

          REPO_URL="${REPO_URL%/}"
          REPO_URL="${REPO_URL// /}"
          case "$REPO_URL" in
            *.git) ;;
            *) REPO_URL="${REPO_URL}.git" ;;
          esac

          case "$REPO_URL" in
            https://gitlab.com/*) ;;
            *)
              echo "ERROR: Invalid GitLab URL: $REPO_URL"
              echo "Use: https://gitlab.com/<owner-or-group>/<repo>.git"
              exit 1
              ;;
          esac

          AUTH_REMOTE="${REPO_URL/https:\/\//https:\/\/oauth2:${GL_TOKEN}@}"
          BRANCH="${{ steps.branch.outputs.target_branch }}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/gitlab_push
          mkdir -p /tmp/gitlab_push
          rsync -a /tmp/final_dump/ /tmp/gitlab_push/
          cd /tmp/gitlab_push

          git init
          git checkout -B "$BRANCH"
          git remote add origin "$AUTH_REMOTE"

          # Prevent HTTP 413 by sending heavy blobs via Git LFS.
          git lfs install --local || true
          git lfs track "*.img" "*.bin" "*.elf" "*.mbn" "payload.bin" "super.img*" || true
          git config lfs.concurrenttransfers 3 || true

          # Validate auth and repository path before committing big data.
          git ls-remote origin >/dev/null 2>&1 || {
            echo "ERROR: GitLab auth/repo check failed (403 غالبا token scope أو repo path غلط)."
            echo "Expected repo URL: $REPO_URL"
            echo "Required token scope: write_repository"
            exit 1
          }

          find . -type f -name '*.apk' -size +100M -delete 2>/dev/null || true

          MAX_MB='${{ inputs.gitlab_max_file_size_mb }}'
          EXCLUDES='${{ inputs.gitlab_exclude_files }}'
          SOFT_FAIL='${{ inputs.gitlab_quota_soft_fail }}'
          case "$MAX_MB" in
            ''|*[!0-9]*) MAX_MB=1024 ;;
          esac

          # Reduce GitLab payload size to avoid quota/limit failures.
          for pat in $EXCLUDES; do
            find . -type f -name "$pat" -print -delete 2>/dev/null || true
          done
          find . -type f -size +"${MAX_MB}"M -print -delete 2>/dev/null || true

          push_with_retry() {
            local mode="${1:-normal}"
            local ok=false
            QUOTA_HIT=false
            for i in 1 2 3; do
              if [ "$mode" = "force" ]; then
                if git push origin "$BRANCH" --force 2>&1 | tee /tmp/gitlab_push_last.log; then
                  ok=true
                  break
                fi
              else
                if git push origin "$BRANCH" 2>&1 | tee /tmp/gitlab_push_last.log; then
                  ok=true
                  break
                fi
              fi
              if grep -qi "exceed the allocated storage" /tmp/gitlab_push_last.log; then
                QUOTA_HIT=true
                return 2
              fi
              echo "GitLab push attempt $i failed."
              sleep 5
            done
            [ "$ok" = true ] || return 1
          }

          # Seed branch with tiny first commit to avoid force-pushing huge first pack.
          echo "dump_engine=${{ steps.engine.outputs.name }}" > .dump_seed.txt
          git add .dump_seed.txt .gitattributes
          git commit -m "seed: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" || true
          push_with_retry force || {
            rc=$?
            if [ "$rc" -eq 2 ] && [ "$SOFT_FAIL" = "true" ]; then
              echo "WARNING: GitLab quota exceeded. Soft-fail enabled, skipping GitLab upload."
              exit 0
            fi
            echo "ERROR: GitLab seed push failed"
            exit 1
          }

          # Push data in small batches to reduce HTTP payload per request.
          BATCH_SIZE=35
          staged=0
          batch_no=1

          while IFS= read -r -d '' f; do
            [ "$f" = "./.dump_seed.txt" ] && continue
            git add "$f"
            staged=$((staged + 1))

            if [ "$staged" -ge "$BATCH_SIZE" ]; then
              git commit -m "dump batch ${batch_no}: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" || true
              push_with_retry || {
                rc=$?
                if [ "$rc" -eq 2 ] && [ "$SOFT_FAIL" = "true" ]; then
                  echo "WARNING: GitLab quota exceeded at batch ${batch_no}. Soft-fail enabled, stopping GitLab upload."
                  exit 0
                fi
                echo "ERROR: GitLab batch push failed at batch ${batch_no}"
                exit 1
              }
              staged=0
              batch_no=$((batch_no + 1))
            fi
          done < <(find . -type f -not -path './.git/*' -print0)

          if ! git diff --cached --quiet; then
            git commit -m "dump final: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" || true
            push_with_retry || {
              rc=$?
              if [ "$rc" -eq 2 ] && [ "$SOFT_FAIL" = "true" ]; then
                echo "WARNING: GitLab quota exceeded at final push. Soft-fail enabled, stopping GitLab upload."
                exit 0
              fi
              echo "ERROR: GitLab final push failed"
              exit 1
            }
          fi

      - name: Mirror to Gitea / Codeberg
        if: inputs.upload_gitea == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_REPO: ${{ secrets.GITEA_REPO }}
          GITEA_URL: ${{ secrets.GITEA_URL }}
        run: |
          set -e

          GT_TOKEN="${GITEA_TOKEN:-}"
          GT_USER="${GITEA_USERNAME:-}"
          GT_REPO="${GITEA_REPO:-}"
          GT_URL="${GITEA_URL:-}"

          [ -n "$GT_TOKEN" ] || { echo "ERROR: Missing GITEA_TOKEN"; exit 1; }
          [ -n "$GT_USER" ] || { echo "ERROR: Missing GITEA_USERNAME"; exit 1; }
          [ -n "$GT_REPO" ] || { echo "ERROR: Missing GITEA_REPO"; exit 1; }
          [ -n "$GT_URL" ] || { echo "ERROR: Missing GITEA_URL"; exit 1; }

          BRANCH="${{ steps.branch.outputs.target_branch }}"
          REMOTE="${GT_URL%/}/${GT_USER}/${GT_REPO}.git"
          AUTH_REMOTE="${REMOTE/https:\/\//https:\/\/${GT_USER}:${GT_TOKEN}@}"

          rm -rf /tmp/gitea_push
          mkdir -p /tmp/gitea_push
          rsync -a /tmp/final_dump/ /tmp/gitea_push/
          cd /tmp/gitea_push

          git init
          git checkout -B "$BRANCH"
          git remote add origin "$AUTH_REMOTE"
          find . -type f -name '*.apk' -size +100M -delete 2>/dev/null || true
          git add -A
          git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" || echo "Nothing new to commit"
          git push origin "$BRANCH" --force

      - name: Upload to SourceForge (rsync over SSH)
        if: inputs.upload_sourceforge == 'true'
        env:
          SF_USER: ${{ secrets.SF_USER }}
          SF_PROJECT: ${{ secrets.SF_PROJECT }}
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          set -e

          [ -n "${SF_USER:-}" ] || { echo "ERROR: Missing SF_USER"; exit 1; }
          [ -n "${SF_PROJECT:-}" ] || { echo "ERROR: Missing SF_PROJECT"; exit 1; }
          [ -n "${SF_SSH_KEY:-}" ] || { echo "ERROR: Missing SF_SSH_KEY"; exit 1; }

          BRANCH="${{ steps.branch.outputs.target_branch }}"
          mkdir -p ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null || true

          rsync -avz --delete -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no" \
            /tmp/final_dump/ \
            "${SF_USER}@frs.sourceforge.net:/home/frs/project/${SF_PROJECT}/${BRANCH}/"

      - name: Upload to Cloudflare R2 (S3-compatible)
        if: inputs.upload_r2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -e

          [ -n "${R2_ACCESS_KEY_ID:-}" ] || { echo "ERROR: Missing R2_ACCESS_KEY_ID"; exit 1; }
          [ -n "${R2_SECRET_ACCESS_KEY:-}" ] || { echo "ERROR: Missing R2_SECRET_ACCESS_KEY"; exit 1; }
          [ -n "${R2_BUCKET:-}" ] || { echo "ERROR: Missing R2_BUCKET"; exit 1; }
          [ -n "${R2_ENDPOINT:-}" ] || { echo "ERROR: Missing R2_ENDPOINT"; exit 1; }

          BRANCH="${{ steps.branch.outputs.target_branch }}"

          if ! command -v aws >/dev/null 2>&1; then
            pip3 install awscli --quiet
          fi

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          aws s3 sync /tmp/final_dump/ "s3://${R2_BUCKET}/${BRANCH}/" \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress

      - name: Complete job
        run: |
          echo "=============================="
          echo "Dump job finished successfully"
          echo "=============================="
          echo "Branch: ${{ steps.branch.outputs.target_branch }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
