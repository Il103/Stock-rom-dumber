name: HyperOS ROM Dumper (Smart)

on:
  workflow_dispatch:
    inputs:
      rom_type:
        description: "ROM type (auto/recovery/fastboot)"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - recovery
          - fastboot

      rom_url:
        description: "Direct ROM download URL"
        required: true
        type: string

      release_tag:
        description: "Release tag (example: HyperOS-spinel-V816.0.4.0.UNACNXM)"
        required: true
        type: string

      device_name:
        description: "Device codename override (optional)"
        required: false
        default: "unknown"
        type: string

      convert_sparse:
        description: "Convert sparse -> raw images (fastboot only)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      compress_images:
        description: "Compress images using xz"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      extract_contents:
        description: "Mount images and extract filesystem contents"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      upload_original:
        description: "Upload original ROM archive"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          set -e
          echo ":: Disk before cleanup"
          df -h /

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/swift \
            /usr/local/.ghcup \
            "$AGENT_TOOLSDIRECTORY"

          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get clean -qq || true

          echo ":: Disk after cleanup"
          df -h /

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            aria2 unzip tar python3 xz-utils file curl jq \
            android-sdk-libsparse-utils \
            e2fsprogs e2tools erofs-utils \
            util-linux rsync

      - name: Install payload-dumper-go
        run: |
          set -e
          echo ":: Fetching latest payload-dumper-go release"
          ASSET_URL=$(curl -fsSL https://api.github.com/repos/ssut/payload-dumper-go/releases/latest | jq -r '.assets[] | select(.name|test("linux.*amd64")) | .browser_download_url' | head -n1)

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "ERROR: Could not locate linux/amd64 payload-dumper-go binary"
            exit 1
          fi

          wget -q "$ASSET_URL" -O /tmp/pdg.tar.gz
          tar -xzf /tmp/pdg.tar.gz -C /tmp/
          chmod +x /tmp/payload-dumper-go
          sudo mv /tmp/payload-dumper-go /usr/local/bin/payload-dumper-go
          payload-dumper-go --version || true

      - name: Download ROM archive
        run: |
          set -e
          mkdir -p rom_dl
          echo ":: URL: ${{ inputs.rom_url }}"

          aria2c \
            --file-allocation=none \
            -x 16 -s 16 -k 4M \
            --retry-wait=5 --max-tries=5 \
            --console-log-level=warn \
            --summary-interval=30 \
            --dir=rom_dl \
            --out=rom_archive \
            "${{ inputs.rom_url }}"

          ls -lh rom_dl/rom_archive

      - name: Detect ROM type (smart)
        id: mode
        run: |
          set -e
          INPUT_TYPE="${{ inputs.rom_type }}"

          detect_from_archive() {
            local archive="$1"
            local mime
            mime=$(file -b --mime-type "$archive")

            if [ "$mime" = "application/gzip" ] || [ "$mime" = "application/x-gzip" ]; then
              echo "fastboot"
              return
            fi

            if [ "$mime" = "application/zip" ]; then
              if unzip -l "$archive" 2>/dev/null | grep -qi "payload\.bin"; then
                echo "recovery"
              else
                echo "fastboot"
              fi
              return
            fi

            if tar -tf "$archive" 2>/dev/null | grep -qiE "(^|/)images/.+\.img$|\.img$"; then
              echo "fastboot"
              return
            fi

            echo "unknown"
          }

          if [ "$INPUT_TYPE" != "auto" ]; then
            ROM_TYPE="$INPUT_TYPE"
          else
            ROM_TYPE=$(detect_from_archive rom_dl/rom_archive)
          fi

          if [ "$ROM_TYPE" = "unknown" ]; then
            echo "ERROR: Could not detect ROM type. Use rom_type override."
            exit 1
          fi

          echo "Detected ROM type: $ROM_TYPE"
          echo "rom_type=$ROM_TYPE" >> "$GITHUB_OUTPUT"

      - name: Recovery -> extract payload.bin and dump images
        if: steps.mode.outputs.rom_type == 'recovery'
        run: |
          set -e
          mkdir -p out/images

          PAYLOAD_ENTRY=$(unzip -l rom_dl/rom_archive | awk '{print $4}' | grep -i "payload\.bin" | head -n1)

          if [ -z "$PAYLOAD_ENTRY" ]; then
            echo "ERROR: payload.bin not found"
            unzip -l rom_dl/rom_archive | tail -n 40
            exit 1
          fi

          unzip -p rom_dl/rom_archive "$PAYLOAD_ENTRY" > /tmp/payload.bin
          payload-dumper-go -output out/images /tmp/payload.bin
          rm -f /tmp/payload.bin

          if [ "${{ inputs.upload_original }}" = "true" ]; then
            cp rom_dl/rom_archive out/rom_archive_original.zip
          fi

      - name: Fastboot -> extract archive and collect images
        if: steps.mode.outputs.rom_type == 'fastboot'
        run: |
          set -e
          mkdir -p out/images

          MIME=$(file -b --mime-type rom_dl/rom_archive)
          echo "Detected MIME: $MIME"

          case "$MIME" in
            application/gzip|application/x-gzip)
              tar -xzf rom_dl/rom_archive -C out/images/
              ;;
            application/zip)
              unzip -o rom_dl/rom_archive -d out/images/
              ;;
            application/x-bzip2)
              tar -xjf rom_dl/rom_archive -C out/images/
              ;;
            application/x-xz)
              tar -xJf rom_dl/rom_archive -C out/images/
              ;;
            *)
              tar -xf rom_dl/rom_archive -C out/images/ 2>/dev/null || unzip -o rom_dl/rom_archive -d out/images/
              ;;
          esac

          # Move all img files to out/images root and keep unique names.
          while IFS= read -r -d '' img; do
            base=$(basename "$img")
            target="out/images/$base"
            if [ -e "$target" ]; then
              hash=$(sha1sum "$img" | cut -c1-8)
              target="out/images/${base%.img}_$hash.img"
            fi
            mv "$img" "$target"
          done < <(find out/images -type f -iname '*.img' -print0)

          find out/images -mindepth 1 -type d -empty -delete

          if [ "${{ inputs.upload_original }}" = "true" ]; then
            cp rom_dl/rom_archive out/rom_archive_original
          fi

          ls -lh out/images/*.img 2>/dev/null || { echo "ERROR: no .img files found"; exit 1; }

      - name: Convert sparse images to raw
        if: steps.mode.outputs.rom_type == 'fastboot' && inputs.convert_sparse == 'true'
        run: |
          set -e
          ok=0
          skip=0

          for img in out/images/*.img; do
            [ -e "$img" ] || continue
            if simg2img "$img" "${img}.raw" 2>/dev/null; then
              mv "${img}.raw" "$img"
              ok=$((ok + 1))
              echo "converted: $(basename "$img")"
            else
              rm -f "${img}.raw"
              skip=$((skip + 1))
            fi
          done

          echo "Converted: $ok | Already raw: $skip"

      - name: Auto-extract device info from images
        id: devinfo
        run: |
          set -e
          mkdir -p /tmp/rom_mnt
          rm -f /tmp/build.prop

          try_extract_build_prop() {
            local img="$1"

            # ext4 path options via debugfs
            debugfs -R "cat /build.prop" "$img" > /tmp/build.prop 2>/dev/null && [ -s /tmp/build.prop ] && return 0
            debugfs -R "cat /system/build.prop" "$img" > /tmp/build.prop 2>/dev/null && [ -s /tmp/build.prop ] && return 0

            # mount fallback for erofs/f2fs/ext4
            local loop
            loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
            if [ -n "$loop" ]; then
              if sudo mount -o ro "$loop" /tmp/rom_mnt 2>/dev/null; then
                for bp in /tmp/rom_mnt/build.prop /tmp/rom_mnt/system/build.prop; do
                  if [ -f "$bp" ]; then
                    cp "$bp" /tmp/build.prop
                    sudo umount /tmp/rom_mnt || true
                    sudo losetup -d "$loop" || true
                    return 0
                  fi
                done
                sudo umount /tmp/rom_mnt || true
              fi
              sudo losetup -d "$loop" || true
            fi

            return 1
          }

          found=0
          for part in system system_ext product vendor odm; do
            candidate="out/images/${part}.img"
            if [ -f "$candidate" ] && try_extract_build_prop "$candidate"; then
              found=1
              break
            fi
          done

          if [ "$found" -eq 0 ]; then
            # fallback: first image containing readable props strings
            for candidate in out/images/*.img; do
              [ -e "$candidate" ] || continue
              strings "$candidate" | grep -E '^ro\.(product\.device|product\.model|product\.brand|build\.fingerprint|build\.version\.incremental|build\.version\.security_patch|mi\.os\.version\.name|miui\.ui\.version\.name)=' > /tmp/build.prop 2>/dev/null || true
              if [ -s /tmp/build.prop ]; then
                found=1
                break
              fi
            done
          fi

          get_prop() {
            local key="$1"
            grep -m1 "^${key}=" /tmp/build.prop 2>/dev/null | cut -d= -f2-
          }

          CODENAME=$(get_prop ro.product.device)
          MODEL=$(get_prop ro.product.model)
          BRAND=$(get_prop ro.product.brand)
          BUILD=$(get_prop ro.build.version.incremental)
          PATCH=$(get_prop ro.build.version.security_patch)
          FINGERPRINT=$(get_prop ro.build.fingerprint)
          HYPEROS=$(get_prop ro.mi.os.version.name)

          if [ -n "$CODENAME" ] && [ "$CODENAME" != "unknown" ]; then
            FINAL_DEVICE="$CODENAME"
          else
            FINAL_DEVICE="${{ inputs.device_name }}"
          fi

          echo "device=$FINAL_DEVICE" >> "$GITHUB_OUTPUT"
          echo "codename=$CODENAME" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "brand=$BRAND" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "hyperos=$HYPEROS" >> "$GITHUB_OUTPUT"

      - name: Extract all image filesystems
        if: inputs.extract_contents == 'true'
        run: |
          set -e
          mkdir -p out/extracted

          extract_one() {
            local img="$1"
            local name="$2"
            local dest="out/extracted/$name"
            mkdir -p "$dest"

            # ext4 dump via debugfs
            if debugfs -R "ls" "$img" >/dev/null 2>&1; then
              if debugfs -R "rdump / $dest" "$img" >/dev/null 2>&1; then
                echo "[OK] debugfs extracted $name"
                return 0
              fi
            fi

            # loopback mount fallback
            local loop
            loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
            if [ -n "$loop" ]; then
              local mnt="/tmp/mnt_$name"
              mkdir -p "$mnt"
              if sudo mount -o ro "$loop" "$mnt" 2>/dev/null; then
                sudo rsync -a "$mnt/" "$dest/" || true
                sudo umount "$mnt" || true
                sudo losetup -d "$loop" || true
                sudo chown -R "$USER":"$USER" "$dest" || true
                echo "[OK] mounted and extracted $name"
                return 0
              fi
              sudo losetup -d "$loop" || true
            fi

            rm -rf "$dest"
            echo "[SKIP] cannot extract $name"
            return 1
          }

          ok=0
          for img in out/images/*.img; do
            [ -e "$img" ] || continue
            name=$(basename "$img" .img)
            if extract_one "$img" "$name"; then
              ok=$((ok + 1))
            fi
          done

          echo "Extracted partitions: $ok"

      - name: Compress images with xz
        if: inputs.compress_images == 'true'
        run: |
          set -e
          for img in out/images/*.img; do
            [ -e "$img" ] || continue
            xz -T0 -6 "$img"
          done

      - name: Generate checksums and release body
        run: |
          set -e
          mkdir -p out

          if [ -d out/images ]; then
            (cd out/images && sha256sum * 2>/dev/null | sort > SHA256SUMS.txt)
            cp out/images/SHA256SUMS.txt out/SHA256SUMS.txt 2>/dev/null || true
          fi

          {
            echo "## HyperOS ROM Dump"
            echo
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Device | ${{ steps.devinfo.outputs.device }} |"
            echo "| ROM Type | ${{ steps.mode.outputs.rom_type }} |"
            echo "| Release Tag | ${{ inputs.release_tag }} |"
            echo "| Source URL | ${{ inputs.rom_url }} |"
            echo

            echo "### Auto Device Info"
            echo
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Brand | ${{ steps.devinfo.outputs.brand }} |"
            echo "| Model | ${{ steps.devinfo.outputs.model }} |"
            echo "| Codename | ${{ steps.devinfo.outputs.codename }} |"
            echo "| Build | ${{ steps.devinfo.outputs.build }} |"
            echo "| Security Patch | ${{ steps.devinfo.outputs.patch }} |"
            echo "| HyperOS | ${{ steps.devinfo.outputs.hyperos }} |"
            echo

            echo "### Files"
            echo
            echo "| File | Size |"
            echo "|------|------|"
            for f in out/images/*; do
              [ -f "$f" ] || continue
              echo "| \`$(basename "$f")\` | $(du -h "$f" | cut -f1) |"
            done

            if [ -d out/extracted ]; then
              echo
              echo "### Extracted Filesystems"
              echo
              find out/extracted -mindepth 1 -maxdepth 1 -type d -printf "- %f\n"
            fi
          } > /tmp/release_body.md

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "[${{ steps.devinfo.outputs.device }}] HyperOS ${{ steps.mode.outputs.rom_type }} dump - ${{ inputs.release_tag }}"
          body_path: /tmp/release_body.md
          files: |
            out/images/*
            out/SHA256SUMS.txt
            out/rom_archive_original*
            out/extracted/**
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
          make_latest: false

      - name: Job summary
        if: always()
        run: |
          {
            echo "## ROM Dump Complete"
            echo
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Device | ${{ steps.devinfo.outputs.device }} |"
            echo "| ROM Type | ${{ steps.mode.outputs.rom_type }} |"
            echo "| Release Tag | ${{ inputs.release_tag }} |"
            echo
            echo "### Uploaded files"
            if [ -d out/images ]; then
              ls -lh out/images
            else
              echo "No images directory found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
