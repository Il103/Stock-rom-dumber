name: HyperOS ROM Dumper (DumprX -> Repo)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (will be used exactly as entered)"
        required: true
        type: string
      release_tag:
        description: "Folder name for this dump"
        required: true
        type: string
      device_name:
        description: "Device codename override (optional)"
        required: false
        default: "unknown"
        type: string
      extract_contents:
        description: "Extract mounted filesystem contents when possible"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      compress_images:
        description: "Compress *.img with xz before commit"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Prepare workspace and free disk
        run: |
          set -e
          echo ":: Disk before"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo ":: Disk after"
          df -h /

      - name: Install dependencies for DumprX
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl jq aria2 file rsync unzip tar zip \
            python3 python3-pip xz-utils \
            p7zip-full unrar sharutils cabextract \
            brotli liblz4-tool gawk detox cpio rename \
            android-sdk-libsparse-utils e2fsprogs e2tools erofs-utils \
            git-lfs

          if ! command -v uv >/dev/null 2>&1; then
            curl -fsSL https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate input URL (no auto/fallback links)
        id: validate
        run: |
          set -e
          URL='${{ inputs.rom_url }}'
          [ -n "$URL" ] || { echo "ERROR: rom_url is empty"; exit 1; }
          echo "$URL" | grep -qE '^https?://' || { echo "ERROR: rom_url must start with http/https"; exit 1; }
          echo "rom_url=$URL" >> "$GITHUB_OUTPUT"
          echo ":: Using EXACT user URL"
          echo "$URL"

      - name: Clone DumprX toolkit
        run: |
          set -e
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX

      - name: Run DumprX with provided URL
        run: |
          set -e
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          # DumprX reads the URL argument directly. No internal hardcoded ROM URL is passed from this workflow.
          ./dumper.sh '${{ steps.validate.outputs.rom_url }}'

      - name: Collect output files
        run: |
          set -e
          DUMP_ROOT="rom_dumps/${{ inputs.release_tag }}"
          mkdir -p "$DUMP_ROOT"

          if [ ! -d /tmp/DumprX/out ]; then
            echo "ERROR: DumprX did not produce /tmp/DumprX/out"
            exit 1
          fi

          rsync -a /tmp/DumprX/out/ "$DUMP_ROOT/"

          # Keep source URL and run metadata beside dump files.
          {
            echo "rom_url=${{ steps.validate.outputs.rom_url }}"
            echo "release_tag=${{ inputs.release_tag }}"
            echo "device_name_input=${{ inputs.device_name }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "dumped_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > "$DUMP_ROOT/_dump_info.txt"

      - name: Optional image compression
        if: inputs.compress_images == 'true'
        run: |
          set -e
          DUMP_ROOT="rom_dumps/${{ inputs.release_tag }}"
          find "$DUMP_ROOT" -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            xz -T0 -6 "$img"
          done

      - name: Optional filesystem extraction pass
        if: inputs.extract_contents == 'true'
        run: |
          set -e
          DUMP_ROOT="rom_dumps/${{ inputs.release_tag }}"
          EXTRACT_ROOT="$DUMP_ROOT/extracted"
          mkdir -p "$EXTRACT_ROOT"

          find "$DUMP_ROOT" -maxdepth 2 -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            name=$(basename "$img" .img)
            out="$EXTRACT_ROOT/$name"
            mkdir -p "$out"

            if debugfs -R "rdump / $out" "$img" >/dev/null 2>&1; then
              continue
            fi

            loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
            if [ -n "$loop" ]; then
              mnt="/tmp/mnt_$name"
              mkdir -p "$mnt"
              if sudo mount -o ro "$loop" "$mnt" 2>/dev/null; then
                sudo rsync -a "$mnt/" "$out/" || true
                sudo umount "$mnt" 2>/dev/null || true
              fi
              sudo losetup -d "$loop" 2>/dev/null || true
            fi

            sudo chown -R "$USER:$USER" "$out" 2>/dev/null || true
          done

      - name: Commit dump files to same repository
        run: |
          set -e
          git lfs install

          # Track large binary files with LFS before adding.
          git lfs track "rom_dumps/**/*.img" "rom_dumps/**/*.img.xz" "rom_dumps/**/*.bin" "rom_dumps/**/*.new.dat" "rom_dumps/**/*.br"

          git add .gitattributes rom_dumps/${{ inputs.release_tag }}

          if git diff --cached --quiet; then
            echo "No file changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "dump: ${{ inputs.release_tag }}"
          git push origin "${{ github.ref_name }}"

      - name: Job summary
        if: always()
        run: |
          {
            echo "## DumprX Dump Complete"
            echo
            echo "- URL used exactly: \`${{ steps.validate.outputs.rom_url }}\`"
            echo "- Commit branch: \`${{ github.ref_name }}\`"
            echo "- Dump folder: \`rom_dumps/${{ inputs.release_tag }}\`"
            echo "- Release upload: disabled"
            echo
            if [ -d "rom_dumps/${{ inputs.release_tag }}" ]; then
              echo "### Files"
              echo '```'
              ls -lah "rom_dumps/${{ inputs.release_tag }}" | sed -n '1,200p'
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
