name: Stock ROM Dumper (DumprX -> Multi Upload)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (used exactly as entered)"
        required: true
        type: string
      target_branch:
        description: "Branch to push files (auto = generate from dump info)"
        required: false
        default: "auto"
        type: string
      device_name:
        description: "Device codename fallback"
        required: false
        default: "unknown"
        type: string
      extract_contents:
        description: "Try extracting filesystem contents from images"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      compress_images:
        description: "Compress .img to .img.xz before push"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_github_branch:
        description: "Upload to this repo smart branch"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      upload_gitlab:
        description: "Upload to GitLab"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      upload_gitea:
        description: "Upload to Gitea/Codeberg"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_sourceforge:
        description: "Upload to SourceForge"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_r2:
        description: "Upload to Cloudflare R2"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk
        run: |
          set -e
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git git-lfs curl jq file rsync unzip tar zip \
            python3 python3-pip xz-utils p7zip-full sharutils cabextract \
            brotli liblz4-tool gawk detox cpio rename \
            device-tree-compiler e2fsprogs openssh-client

      - name: Validate URL
        id: input
        run: |
          set -e
          URL='${{ inputs.rom_url }}'
          [ -n "$URL" ] || { echo "ERROR: rom_url is empty"; exit 1; }
          echo "$URL" | grep -qE '^https?://' || { echo "ERROR: rom_url must start with http/https"; exit 1; }
          echo "rom_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL exactly: $URL"

      - name: Clone DumprX
        run: |
          set -e
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX

      - name: Run DumprX with exact URL
        run: |
          set +e
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          export TERM=xterm
          ./dumper.sh '${{ steps.input.outputs.rom_url }}'
          code=$?
          if [ "$code" -ne 0 ]; then
            if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
              echo "DumprX returned non-zero but output exists. Continuing."
            else
              echo "DumprX failed and no output found."
              exit "$code"
            fi
          fi

      - name: Collect output
        run: |
          set -e
          mkdir -p /tmp/final_dump
          [ -d /tmp/DumprX/out ] || { echo "ERROR: /tmp/DumprX/out missing"; exit 1; }
          rsync -a /tmp/DumprX/out/ /tmp/final_dump/
          {
            echo "rom_url=${{ steps.input.outputs.rom_url }}"
            echo "target_branch_input=${{ inputs.target_branch }}"
            echo "device_name_input=${{ inputs.device_name }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "dumped_at=$(date -u '+%Y-%m-%d %H:%M UTC')"
          } > /tmp/final_dump/_dump_info.txt

      - name: Resolve target branch
        id: branch
        run: |
          set -e
          sanitize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//'
          }
          input='${{ inputs.target_branch }}'
          if [ -n "$input" ] && [ "$input" != "auto" ]; then
            out=$(sanitize "$input")
          else
            readme=/tmp/final_dump/README.md
            brand=$(awk -F': ' '/^- Brand:/{print $2; exit}' "$readme" 2>/dev/null || true)
            code=$(awk -F': ' '/^- Codename:/{print $2; exit}' "$readme" 2>/dev/null || true)
            incr=$(awk -F': ' '/^- Incremental:/{print $2; exit}' "$readme" 2>/dev/null || true)
            [ -n "$brand" ] || brand=stock
            [ -n "$code" ] || code='${{ inputs.device_name }}'
            out=$(sanitize "dump-$brand-$code-$incr")
          fi
          [ -n "$out" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"
          [ "$out" != "main" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"
          echo "target_branch=$out" >> "$GITHUB_OUTPUT"
          echo "target_branch_resolved=$out" >> /tmp/final_dump/_dump_info.txt
          echo "Resolved branch: $out"

      - name: Recovery fallback from vendor_boot
        run: |
          set -e
          if ! find /tmp/final_dump -type f -iname 'recovery.img' | grep -q .; then
            vb=$(find /tmp/final_dump -type f -iname 'vendor_boot*.img' | head -n1 || true)
            if [ -n "$vb" ] && [ -f "$vb" ]; then
              cp "$vb" /tmp/final_dump/recovery_from_vendor_boot.img
              echo "recovery_fallback=vendor_boot" >> /tmp/final_dump/_dump_info.txt
              echo "recovery_source_file=$(basename "$vb")" >> /tmp/final_dump/_dump_info.txt
            fi
          fi

      - name: Optional compress images
        if: inputs.compress_images == 'true'
        run: |
          set -e
          find /tmp/final_dump -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            xz -T0 -6 "$img"
          done

      - name: Extract image contents (parallel)
        if: inputs.extract_contents == 'true'
        shell: python3
        run: |
          import os, subprocess
          dump = "/tmp/final_dump"
          extracted = os.path.join(dump, "extracted")
          os.makedirs(extracted, exist_ok=True)
          for fname in os.listdir(dump):
              if not fname.endswith(".img") or fname.startswith("super"):
                  continue
              fpath = os.path.join(dump, fname)
              if os.path.getsize(fpath) > 1073741824:
                  print(f"Skipping {fname} (too large)")
                  continue
              name = fname[:-4]
              out = os.path.join(extracted, name)
              os.makedirs(out, exist_ok=True)
              for cmd in [
                      ["debugfs", "-R", f"rdump / {out}", fpath],
                      ["simg2img", fpath, fpath + ".raw"]]:
                  r = subprocess.run(cmd, capture_output=True, timeout=60)
                  if r.returncode == 0:
                      if cmd[0] == "simg2img":
                          subprocess.run(
                              ["debugfs", "-R", f"rdump / {out}", fpath + ".raw"],
                              timeout=60)
                          os.unlink(fpath + ".raw")
                      break
              print(f"  Extracted: {name}")

      - name: Analyze ROM and generate device info
        shell: python3
        run: |
          import os
          dump = "/tmp/final_dump"
          info = os.path.join(dump, "_device_info.txt")
          keys = ["ro.product.device","ro.product.name","ro.product.model",
                  "ro.build.description","ro.build.fingerprint",
                  "ro.build.version.release","ro.build.version.sdk",
                  "ro.board.platform","ro.mediatek.platform",
                  "ro.hardware","ro.product.manufacturer",
                  "ro.build.product","ro.product.board"]
          with open(info, "w") as f:
              f.write("=== Device Information ===\n\n")
              for path in ["system/build.prop","vendor/build.prop",
                           "product/build.prop",
                           "extracted/system/build.prop",
                           "extracted/vendor/build.prop",
                           "extracted/product/build.prop"]:
                  bp = os.path.join(dump, path)
                  if not os.path.isfile(bp):
                      continue
                  f.write(f"--- From {path} ---\n")
                  content = open(bp, errors="ignore").read()
                  for k in keys:
                      for line in content.split("\n"):
                          if line.startswith(k + "="):
                              f.write(line.rstrip() + "\n")
                              break
                  f.write("\n")
              from datetime import datetime
              f.write(f"Generated at: {datetime.utcnow()}\n")
          print(open(info).read())

      - name: Generate device trees (DTB scan + trees)
        shell: python3
        run: |
          import os, struct, shutil, subprocess, sys, glob
          DUMP = "/tmp/final_dump"
          TREES = os.path.join(DUMP, "trees")
          os.makedirs(TREES, exist_ok=True)
          DTB_MAGIC = b'\xd0\x0d\xfe\xed'

          def find_dtbs_in_file(filepath, out_dir):
              results = []
              try:
                  with open(filepath, 'rb') as f:
                      data = f.read()
              except:
                  return results
              offset = 0
              count = 0
              while True:
                  pos = data.find(DTB_MAGIC, offset)
                  if pos == -1:
                      break
                  if pos + 12 <= len(data):
                      total_size = struct.unpack('>I', data[pos+8:pos+12])[0]
                      if 100 < total_size < 2000000:
                          dtb_data = data[pos:pos+total_size]
                          fname = os.path.basename(filepath).replace('.img', '')
                          dtb_path = os.path.join(out_dir, f"{fname}_dtb_{count}.dtb")
                          with open(dtb_path, 'wb') as f:
                              f.write(dtb_data)
                          results.append(dtb_path)
                          count += 1
                  offset = pos + 4
              for align in [0, 4, 8, 12]:
                  pos = len(data) - (len(data) % 4096) - align - 4
                  if pos > 0 and data[pos:pos+4] == DTB_MAGIC:
                      total_size = struct.unpack('>I', data[pos+8:pos+12])[0]
                      if 100 < total_size < 2000000 and (pos + total_size) <= len(data):
                          dtb_data = data[pos:pos+total_size]
                          fname = os.path.basename(filepath).replace('.img', '')
                          dtb_path = os.path.join(
                              out_dir, f"{fname}_dtb_append_{count}.dtb")
                          with open(dtb_path, 'wb') as f:
                              f.write(dtb_data)
                          results.append(dtb_path)
                          count += 1
              return results

          def decompile_dtb(dtb_path, dts_dir):
              base = os.path.basename(dtb_path).replace('.dtb', '')
              dts_path = os.path.join(dts_dir, f"{base}.dts")
              try:
                  subprocess.run(
                      ['dtc', '-q', '-I', 'dtb', '-O', 'dts',
                       dtb_path, '-o', dts_path],
                      capture_output=True, timeout=30)
                  if os.path.getsize(dts_path) > 0:
                      return dts_path
              except:
                  pass
              return None

          # 1. Scan raw boot images for DTBs
          dtb_out = os.path.join(TREES, 'dtb')
          dts_out = os.path.join(TREES, 'dts')
          os.makedirs(dtb_out, exist_ok=True)
          os.makedirs(dts_out, exist_ok=True)
          all_dtbs = []
          for pat in ['boot*.img', 'vendor_boot*.img', 'recovery*.img',
                       'dtbo*.img', 'init_boot*.img']:
              for fpath in glob.glob(os.path.join(DUMP, pat)):
                  print(f"Scanning {fpath} for DTBs...")
                  found = find_dtbs_in_file(fpath, dtb_out)
                  all_dtbs.extend(found)
                  for d in found:
                      sz = os.path.getsize(d)
                      print(f"  Found DTB: {d} ({sz} bytes)")
          for root, dirs, files in os.walk(DUMP):
              for f in files:
                  if f.endswith('.dtb') and 'dtb' not in root:
                      src = os.path.join(root, f)
                      dst = os.path.join(dtb_out, f)
                      shutil.copy2(src, dst)
                      all_dtbs.append(dst)
                      print(f"  Copied DTB: {src}")
          for dtb in all_dtbs:
              dts = decompile_dtb(dtb, dts_out)
              if dts:
                  print(f"  Decompiled: {dtb} -> {dts}")
          print(f"Total DTBs: {len(all_dtbs)}, DTS: {len(os.listdir(dts_out))}")

          for kfile in ['kernel', 'ikconfig', 'kallsyms.txt', 'boot.elf']:
              kpath = os.path.join(DUMP, kfile)
              if os.path.isfile(kpath):
                  shutil.copy2(kpath, TREES)

          # 2. Auto-detect device info
          MANUFACTURER = "unknown"
          DEVICE = "unknown"
          PLATFORM = "mt6789"
          for bp in ['system/build.prop', 'vendor/build.prop',
                     'extracted/system/build.prop',
                     'extracted/vendor/build.prop']:
              path = os.path.join(DUMP, bp)
              if not os.path.isfile(path):
                  continue
              for line in open(path, errors='ignore'):
                  if line.startswith('ro.product.manufacturer='):
                      MANUFACTURER = line.strip().split('=', 1)[1].lower().replace(' ', '')
                  elif line.startswith('ro.product.device='):
                      DEVICE = line.strip().split('=', 1)[1].strip()
                  elif line.startswith('ro.mediatek.platform='):
                      p = line.strip().split('=', 1)[1].lower().strip()
                      PLATFORM = f"mt{p}"

          # 3. Recovery tree
          RECOVERY_TREE = os.path.join(TREES, "recovery_tree")
          os.makedirs(RECOVERY_TREE, exist_ok=True)
          for fstab_dir in ['vendor/etc', 'recovery/root', 'odm/etc']:
              d = os.path.join(DUMP, fstab_dir)
              if not os.path.isdir(d):
                  d = os.path.join(DUMP, 'extracted', fstab_dir)
              if not os.path.isdir(d):
                  continue
              for root, dirs, files in os.walk(d):
                  for f in files:
                      if 'fstab' in f:
                          shutil.copy2(os.path.join(root, f), RECOVERY_TREE)
                          print(f"Copied fstab: {f}")
          has_fstab = any('fstab' in f for f in os.listdir(RECOVERY_TREE))
          if not has_fstab:
              rf_path = os.path.join(RECOVERY_TREE, "recovery.fstab")
              with open(rf_path, "w") as f:
                  f.write("# Recovery fstab (auto-generated)\n")
                  for part in ['system','vendor','product','odm','system_ext',
                               'vendor_dlkm','odm_dlkm','userdata','cache',
                               'boot','recovery','dtbo','vbmeta','vbmeta_system',
                               'vbmeta_vendor','metadata','persist','misc','super']:
                      img_path = os.path.join(DUMP, f"{part}.img")
                      if not os.path.isfile(img_path):
                          continue
                      if part in ('userdata',):
                          f.write(f"/data  userdata  f2fs  nosuid,nodev,noatime,latemount,wait,check,formattable  defaults\n")
                      elif part in ('cache',):
                          f.write(f"/cache  cache  ext4  nosuid,nodev,noatime  defaults\n")
                      elif part in ('boot','recovery','dtbo','vbmeta','vbmeta_system','vbmeta_vendor','misc','persist','super'):
                          f.write(f"/{part}  emmc  raw  defaults  defaults\n")
                      else:
                          r = subprocess.run(['file', img_path], capture_output=True, text=True)
                          fstype = 'ext4'
                          for t in ['ext4','erofs','f2fs']:
                              if t in r.stdout:
                                  fstype = t; break
                          f.write(f"/{part}  {part}  {fstype}  ro,barrier=1  defaults\n")
          ir_path = os.path.join(RECOVERY_TREE, "init.recovery.rc")
          with open(ir_path, "w") as f:
              f.write("\n".join([
                  "on early-init",
                  "    start ueventd",
                  "on init",
                  "    export PATH /sbin:/system/sbin:/system/bin:/system/x64b",
                  "    export ANDROID_ROOT /system",
                  "    export ANDROID_DATA /data",
                  "    export EXTERNAL_STORAGE /sdcard",
                  "on fs",
                  "    mount_all /recovery.fstab",
                  "on boot",
                  "    class_start core",
                  "service ueventd /sbin/ueventd",
                  "    critical",
                  "    seclabel u:r:ueventd:s0",
                  "",
              ]))
          for init_dir in ['vendor/etc/init', 'vendor/etc/init/hw']:
              d = os.path.join(DUMP, init_dir)
              if not os.path.isdir(d):
                  d = os.path.join(DUMP, 'extracted', init_dir)
              if not os.path.isdir(d):
                  continue
              for root, dirs, files in os.walk(d):
                  for f in files:
                      if f.endswith('.rc'):
                          shutil.copy2(os.path.join(root, f), RECOVERY_TREE)
          for bp in ['vendor/build.prop','system/build.prop','product/build.prop']:
              f = os.path.join(DUMP, bp)
              if not os.path.isfile(f):
                  f = os.path.join(DUMP, 'extracted', bp.split('/')[0], 'build.prop')
              if os.path.isfile(f):
                  shutil.copy2(f, os.path.join(RECOVERY_TREE, bp.replace('/', '_')))

          # 4. Device tree
          DEVICE_TREE = os.path.join(TREES, "device_tree")
          os.makedirs(DEVICE_TREE, exist_ok=True)
          with open(os.path.join(DEVICE_TREE, "BoardConfig.mk"), "w") as f:
              f.write("\n".join([
                  f"# BoardConfig.mk - Auto-generated",
                  f"# Device: {DEVICE}  Manufacturer: {MANUFACTURER}  Platform: {PLATFORM}",
                  f"DEVICE_PATH := device/{MANUFACTURER}/{DEVICE}",
                  "TARGET_ARCH := arm64",
                  "TARGET_ARCH_VARIANT := armv8-a",
                  "TARGET_CPU_ABI := arm64-v8a",
                  "TARGET_2ND_ARCH := arm",
                  "TARGET_2ND_ARCH_VARIANT := armv8-a",
                  "TARGET_2ND_CPU_ABI := armeabi-v7a",
                  f"TARGET_BOARD_PLATFORM := {PLATFORM}",
                  f"TARGET_BOOTLOADER_BOARD_NAME := {DEVICE}",
                  "BOARD_KERNEL_CMDLINE := bootopt=64S3,32N2,64N2",
                  "BOARD_KERNEL_BASE := 0x40078000",
                  "BOARD_KERNEL_PAGESIZE := 2048",
                  "BOARD_BOOTIMAGE_HEADER_VERSION := 4",
                  "BOARD_VENDOR_BOOTIMAGE_HEADER_VERSION := 4",
                  "TARGET_COPY_OUT_VENDOR := vendor",
                  "TARGET_COPY_OUT_PRODUCT := product",
                  "TARGET_COPY_OUT_SYSTEM_EXT := system_ext",
                  "TARGET_COPY_OUT_ODM := odm",
                  "BOARD_SUPER_PARTITION_SIZE := 9126805504",
                  "BOARD_SUPER_PARTITION_GROUPS := main",
                  "BOARD_MAIN_SIZE := 9122619392",
                  "BOARD_MAIN_PARTITION_LIST := system vendor product system_ext odm vendor_dlkm odm_dlkm",
                  "BOARD_AVB_ENABLE := true",
                  "-include $(DEVICE_PATH)/BoardConfigExtra.mk",
                  "",
              ]))
          with open(os.path.join(DEVICE_TREE, "device.mk"), "w") as f:
              f.write("\n".join([
                  "# device.mk - Auto-generated",
                  "$(call inherit-product, build/target/product/gsi_common.mk)",
                  f"$(call inherit-product-if-exists, vendor/{MANUFACTURER}/{DEVICE}/device-vendor.mk)",
                  f"PRODUCT_DEVICE := {DEVICE}",
                  f"PRODUCT_NAME := {DEVICE}",
                  f"PRODUCT_BRAND := {MANUFACTURER}",
                  f"PRODUCT_MODEL := {DEVICE}",
                  f"PRODUCT_MANUFACTURER := {MANUFACTURER}",
                  f"PRODUCT_BOARD := {PLATFORM}",
                  "$(call inherit-product, $(SRC_TARGET_DIR)/product/core_64_bit.mk)",
                  "$(call inherit-product, $(SRC_TARGET_DIR)/product/emulated_storage.mk)",
                  "",
              ]))
          with open(os.path.join(DEVICE_TREE, "AndroidProducts.mk"), "w") as f:
              f.write("PRODUCT_MAKEFILES := $(LOCAL_DIR)/device.mk\n")
          with open(os.path.join(DEVICE_TREE, "system.prop"), "w") as f:
              f.write("ro.product.first_api_level=33\n")

          # 5. Vendor tree
          VENDOR_TREE = os.path.join(TREES, "vendor_tree")
          os.makedirs(VENDOR_TREE, exist_ok=True)
          vendor_dir = os.path.join(DUMP, 'extracted', 'vendor')
          if not os.path.isdir(vendor_dir):
              vendor_dir = os.path.join(DUMP, 'vendor')
          if os.path.isdir(vendor_dir):
              blobs = []
              for root, dirs, files in os.walk(vendor_dir):
                  for f in files:
                      rel = os.path.relpath(os.path.join(root, f), vendor_dir)
                      blobs.append(rel)
              with open(os.path.join(VENDOR_TREE, "proprietary-files.txt"), "w") as f:
                  f.write("# proprietary-files.txt - Auto-generated\n")
                  for b in sorted(blobs):
                      f.write(b + "\n")
              with open(os.path.join(VENDOR_TREE, "BoardConfigVendor.mk"), "w") as f:
                  f.write("# BoardConfigVendor.mk - Auto-generated\n")
                  kmod = os.path.join(vendor_dir, 'lib', 'modules')
                  if not os.path.isdir(kmod):
                      kmod = os.path.join(DUMP, 'vendor_dlkm', 'lib', 'modules')
                  if os.path.isdir(kmod):
                      for root, dirs, files in os.walk(kmod):
                          for fn in files:
                              if fn.endswith('.ko'):
                                  rel = os.path.relpath(os.path.join(root, fn), kmod)
                                  f.write(f"KERNEL_MODULES += $(VENDOR_PATH)/proprietary/lib/modules/{rel}\n")

          # 6. Kernel modules list
          km_path = os.path.join(TREES, "kernel_modules.txt")
          kmods = []
          for km_dir in ['vendor/lib/modules', 'vendor_dlkm/lib/modules',
                         'extracted/vendor/lib/modules',
                         'extracted/vendor_dlkm/lib/modules']:
              d = os.path.join(DUMP, km_dir)
              if not os.path.isdir(d):
                  continue
              for root, dirs, files in os.walk(d):
                  for f in files:
                      if f.endswith('.ko'):
                          fp = os.path.join(root, f)
                          kmods.append(f"{f}|{os.path.getsize(fp)}|{fp}")
          if kmods:
              with open(km_path, "w") as f:
                  f.write("name|size|path\n")
                  for line in sorted(kmods):
                      f.write(line + "\n")

          # Summary
          with open(os.path.join(TREES, "_trees_summary.txt"), "w") as f:
              f.write(f"Device: {DEVICE}  Manufacturer: {MANUFACTURER}  Platform: {PLATFORM}\n")
              for root, dirs, files in os.walk(TREES):
                  for fn in files:
                      f.write(os.path.join(root, fn) + "\n")

      - name: Push to target branch (smart) - GitHub
        if: inputs.upload_github_branch == 'true'
        run: |
          set -e
          BRANCH="${{ steps.branch.outputs.target_branch }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install --skip-smudge || true
          git lfs track "*.img" "*.zip" "*.xz" "*.gz" "*.tar" "*.bin" "*.dat" "*.so" "*.ko"
          REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$REMOTE_URL" "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH" --depth=1
            git checkout "$BRANCH"
          else
            git checkout --orphan "$BRANCH"
            git rm -rf . --quiet 2>/dev/null || true
          fi
          find /tmp/final_dump -type f -name '*.apk' -size +100M -delete 2>/dev/null || true
          rsync -a --exclude='.git' /tmp/final_dump/ ./
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            for i in 1 2 3; do
              GIT_LFS_SKIP_SMUDGE=1 git push "$REMOTE_URL" "$BRANCH" 2>&1 && break
              echo "GitHub push attempt $i failed, retrying..."
              sleep 10
            done
          fi

      - name: GitHub upload disabled
        if: inputs.upload_github_branch != 'true'
        run: echo "GitHub branch upload is disabled. Skipping."

      - name: Mirror to GitLab (with LFS)
        if: inputs.upload_gitlab == 'true'
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
          GITLAB_PROJECT_PATH: ${{ secrets.GITLAB_PROJECT_PATH }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          set -e
          GL_TOKEN="${GITLAB_TOKEN:-}"
          GL_USER="${GITLAB_USERNAME:-}"
          GL_REPO="${GITLAB_REPO:-}"
          GL_PROJECT_PATH="${GITLAB_PROJECT_PATH:-}"
          GL_REPO_URL="${GITLAB_REPO_URL:-}"
          [ -n "$GL_TOKEN" ] || { echo "ERROR: Missing GITLAB_TOKEN"; exit 1; }
          if [ -n "$GL_REPO_URL" ]; then
            REPO_URL="$GL_REPO_URL"
          elif [ -n "$GL_PROJECT_PATH" ]; then
            REPO_URL="https://gitlab.com/${GL_PROJECT_PATH}.git"
          else
            [ -n "$GL_USER" ] || { echo "ERROR: Missing GITLAB_USERNAME"; exit 1; }
            [ -n "$GL_REPO" ] || { echo "ERROR: Missing GITLAB_REPO"; exit 1; }
            REPO_URL="https://gitlab.com/${GL_USER}/${GL_REPO}.git"
          fi
          REPO_URL="${REPO_URL%/}"; REPO_URL="${REPO_URL// /}"
          case "$REPO_URL" in *.git) ;; *) REPO_URL="${REPO_URL}.git" ;; esac
          AUTH_REMOTE="${REPO_URL/https:\/\//https:\/\/oauth2:${GL_TOKEN}@}"
          BRANCH="${{ steps.branch.outputs.target_branch }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/gitlab_push
          mkdir -p /tmp/gitlab_push
          rsync -a /tmp/final_dump/ /tmp/gitlab_push/
          cd /tmp/gitlab_push
          git init -b "$BRANCH"
          git lfs install --skip-smudge
          git lfs track "*.img" "*.zip" "*.tar" "*.xz" "*.gz" "*.bin" "*.dat" "*.so" "*.ko"
          git add .gitattributes
          find . -type f -name '*.apk' -size +100M -delete 2>/dev/null || true
          git remote add origin "$AUTH_REMOTE"
          git ls-remote origin >/dev/null 2>&1 || {
            echo "ERROR: GitLab auth/repo check failed."
            exit 1
          }
          git add -A
          git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" || echo "Nothing new"
          ok=false
          for i in 1 2 3; do
            if git push origin "$BRANCH" --force; then
              ok=true; break
            fi
            echo "GitLab push attempt $i failed, retrying..."
            sleep 10
          done
          [ "$ok" = true ] || { echo "ERROR: GitLab upload failed after retries"; exit 1; }

      - name: Mirror to Gitea / Codeberg
        if: inputs.upload_gitea == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_REPO: ${{ secrets.GITEA_REPO }}
          GITEA_URL: ${{ secrets.GITEA_URL }}
        run: |
          set -e
          GT_TOKEN="${GITEA_TOKEN:-}"; GT_USER="${GITEA_USERNAME:-}"
          GT_REPO="${GITEA_REPO:-}"; GT_URL="${GITEA_URL:-}"
          [ -n "$GT_TOKEN" ] || { echo "ERROR: Missing GITEA_TOKEN"; exit 1; }
          BRANCH="${{ steps.branch.outputs.target_branch }}"
          REMOTE="${GT_URL%/}/${GT_USER}/${GT_REPO}.git"
          AUTH_REMOTE="${REMOTE/https:\/\//https:\/\/${GT_USER}:${GT_TOKEN}@}"
          rm -rf /tmp/gitea_push; mkdir -p /tmp/gitea_push
          rsync -a /tmp/final_dump/ /tmp/gitea_push/
          cd /tmp/gitea_push
          git init -b "$BRANCH"
          git lfs install --skip-smudge 2>/dev/null || true
          git lfs track "*.img" "*.zip" "*.xz" "*.gz" 2>/dev/null || true
          git remote add origin "$AUTH_REMOTE"
          find . -type f -name '*.apk' -size +100M -delete 2>/dev/null || true
          git add -A
          git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" || echo "Nothing new"
          git push origin "$BRANCH" --force

      - name: Upload to SourceForge (rsync over SSH)
        if: inputs.upload_sourceforge == 'true'
        env:
          SF_USER: ${{ secrets.SF_USER }}
          SF_PROJECT: ${{ secrets.SF_PROJECT }}
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          set -e
          [ -n "${SF_USER:-}" ] || { echo "ERROR: Missing SF_USER"; exit 1; }
          [ -n "${SF_PROJECT:-}" ] || { echo "ERROR: Missing SF_PROJECT"; exit 1; }
          [ -n "${SF_SSH_KEY:-}" ] || { echo "ERROR: Missing SF_SSH_KEY"; exit 1; }
          BRANCH="${{ steps.branch.outputs.target_branch }}"
          mkdir -p ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/sf_key; chmod 600 ~/.ssh/sf_key
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no" \
            /tmp/final_dump/ \
            "${SF_USER}@frs.sourceforge.net:/home/frs/project/${SF_PROJECT}/${BRANCH}/"

      - name: Upload to Cloudflare R2 (S3-compatible)
        if: inputs.upload_r2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -e
          [ -n "${R2_ACCESS_KEY_ID:-}" ] || { echo "ERROR: Missing R2_ACCESS_KEY_ID"; exit 1; }
          [ -n "${R2_SECRET_ACCESS_KEY:-}" ] || { echo "ERROR: Missing R2_SECRET_ACCESS_KEY"; exit 1; }
          [ -n "${R2_BUCKET:-}" ] || { echo "ERROR: Missing R2_BUCKET"; exit 1; }
          [ -n "${R2_ENDPOINT:-}" ] || { echo "ERROR: Missing R2_ENDPOINT"; exit 1; }
          BRANCH="${{ steps.branch.outputs.target_branch }}"
          if ! command -v aws >/dev/null 2>&1; then pip3 install awscli --quiet; fi
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"
          aws s3 sync /tmp/final_dump/ "s3://${R2_BUCKET}/${BRANCH}/" \
            --endpoint-url "$R2_ENDPOINT" --no-progress

      - name: Complete job
        run: |
          echo "=============================="
          echo "Dump job finished successfully"
          echo "=============================="
          echo "Branch: ${{ steps.branch.outputs.target_branch }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
