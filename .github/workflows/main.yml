name: Stock ROM Dumper (DumprX -> Multi Upload)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (used exactly as entered)"
        required: true
        type: string
      target_branch:
        description: "Branch to push files (auto = generate from dump info)"
        required: false
        default: "auto"
        type: string
      device_name:
        description: "Device codename fallback"
        required: false
        default: "unknown"
        type: string
      extract_contents:
        description: "Try extracting filesystem contents from images"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      compress_images:
        description: "Compress .img to .img.xz before push"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_github_branch:
        description: "Upload to this repo smart branch"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      upload_gitlab:
        description: "Upload to GitLab"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_gitea:
        description: "Upload to Gitea/Codeberg"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_sourceforge:
        description: "Upload to SourceForge"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_r2:
        description: "Upload to Cloudflare R2"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk
        run: |
          set -e
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -qq

          sudo apt-get install -y --no-install-recommends \
            git git-lfs curl jq file rsync unzip tar zip \
            python3 python3-pip xz-utils p7zip-full sharutils cabextract \
            brotli liblz4-tool gawk detox cpio rename \
            device-tree-compiler e2fsprogs

          optional_pkgs=(
            unrar
            android-sdk-libsparse-utils
            e2tools
            erofs-utils
          )

          for pkg in "${optional_pkgs[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y --no-install-recommends "$pkg" || true
            else
              echo "Optional package not available on this runner: $pkg"
            fi
          done

          if ! command -v uv >/dev/null 2>&1; then
            curl -fsSL https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate URL
        id: input
        run: |
          set -e
          URL='${{ inputs.rom_url }}'
          [ -n "$URL" ] || { echo "ERROR: rom_url is empty"; exit 1; }
          echo "$URL" | grep -qE '^https?://' || { echo "ERROR: rom_url must start with http/https"; exit 1; }
          echo "rom_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL exactly: $URL"

      - name: Clone DumprX
        run: |
          set -e
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX

      - name: Run DumprX with exact URL
        run: |
          set +e
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          export TERM=xterm

          ./dumper.sh '${{ steps.input.outputs.rom_url }}'
          code=$?

          if [ "$code" -ne 0 ]; then
            if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
              echo "DumprX returned non-zero but output exists. Continuing."
            else
              echo "DumprX failed and no output found."
              exit "$code"
            fi
          fi

      - name: Collect output
        run: |
          set -e
          mkdir -p /tmp/final_dump
          [ -d /tmp/DumprX/out ] || { echo "ERROR: /tmp/DumprX/out missing"; exit 1; }
          rsync -a /tmp/DumprX/out/ /tmp/final_dump/

          {
            echo "rom_url=${{ steps.input.outputs.rom_url }}"
            echo "target_branch_input=${{ inputs.target_branch }}"
            echo "device_name_input=${{ inputs.device_name }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "dumped_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > /tmp/final_dump/_dump_info.txt

      - name: Resolve target branch
        id: branch
        run: |
          set -e
          sanitize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//'
          }

          input='${{ inputs.target_branch }}'
          if [ -n "$input" ] && [ "$input" != "auto" ]; then
            out=$(sanitize "$input")
          else
            readme=/tmp/final_dump/README.md
            brand=$(awk -F': ' '/^- Brand:/{print $2; exit}' "$readme" 2>/dev/null || true)
            code=$(awk -F': ' '/^- Codename:/{print $2; exit}' "$readme" 2>/dev/null || true)
            incr=$(awk -F': ' '/^- Incremental:/{print $2; exit}' "$readme" 2>/dev/null || true)
            [ -n "$brand" ] || brand=stock
            [ -n "$code" ] || code='${{ inputs.device_name }}'
            out=$(sanitize "dump-$brand-$code-$incr")
          fi

          [ -n "$out" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"
          [ "$out" != "main" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"

          echo "target_branch=$out" >> "$GITHUB_OUTPUT"
          echo "target_branch_resolved=$out" >> /tmp/final_dump/_dump_info.txt
          echo "Resolved branch: $out"

      - name: Recovery fallback from vendor_boot
        run: |
          set -e
          if ! find /tmp/final_dump -type f -iname 'recovery.img' | grep -q .; then
            vb=$(find /tmp/final_dump -type f -iname 'vendor_boot*.img' | head -n1 || true)
            if [ -n "$vb" ] && [ -f "$vb" ]; then
              cp "$vb" /tmp/final_dump/recovery_from_vendor_boot.img
              echo "recovery_fallback=vendor_boot" >> /tmp/final_dump/_dump_info.txt
              echo "recovery_source_file=$(basename "$vb")" >> /tmp/final_dump/_dump_info.txt
            fi
          fi

      - name: Optional compress images
        if: inputs.compress_images == 'true'
        run: |
          set -e
          find /tmp/final_dump -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            xz -T0 -6 "$img"
          done

      - name: Optional extract image contents
        if: inputs.extract_contents == 'true'
        run: |
          set -e
          mkdir -p /tmp/final_dump/extracted
          find /tmp/final_dump -maxdepth 2 -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            name=$(basename "$img" .img)
            out=/tmp/final_dump/extracted/$name
            mkdir -p "$out"

            if command -v debugfs >/dev/null 2>&1; then
              if debugfs -R "rdump / $out" "$img" >/dev/null 2>&1; then
                continue
              fi
            fi

            loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
            if [ -n "$loop" ]; then
              sudo mount -o ro "$loop" /mnt 2>/dev/null && {
                rsync -a /mnt/ "$out/" || true
                sudo umount /mnt || true
              }
              sudo losetup -d "$loop" 2>/dev/null || true
            fi
          done || true

      - name: Push to target branch (smart)
        if: inputs.upload_github_branch == 'true'
        run: |
          set -e
          BRANCH="${{ steps.branch.outputs.target_branch }}"
          echo "Pushing to branch: $BRANCH"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find /tmp/final_dump -type f -name '*.apk' -size +100M -delete 2>/dev/null || true

          git lfs install --skip-smudge || true

          REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "$REMOTE_URL" "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH" --depth=1
            git checkout "$BRANCH"
          else
            git checkout --orphan "$BRANCH"
            git rm -rf . --quiet 2>/dev/null || true
          fi

          rsync -a --exclude='.git' /tmp/final_dump/ ./

          find . -not -path './.git/*' -type f | sort > file_list.txt
          find . -not -path './.git/*' -type f -exec sha256sum {} ; > checksums.sha256

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            for i in 1 2 3; do
              git push "$REMOTE_URL" "$BRANCH" && break || {
                echo "Push attempt $i failed, retrying..."
                sleep 5
              }
            done
          fi

      - name: GitHub upload disabled
        if: inputs.upload_github_branch != 'true'
        run: echo "GitHub branch upload is disabled. Skipping."

      - name: Mirror to GitLab
        if: inputs.upload_gitlab == 'true'
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
        run: |
          set -e

          # تحقق من وجود الـ secrets قبل المحاولة
          GL_TOKEN="${GITLAB_TOKEN:-}"
          GL_USER="${GITLAB_USERNAME:-}"
          GL_REPO="${GITLAB_REPO:-}"

          if [ -z "$GL_TOKEN" ] || [ -z "$GL_USER" ] || [ -z "$GL_REPO" ]; then
            echo "WARNING: GitLab secrets missing (GITLAB_TOKEN, GITLAB_USERNAME, GITLAB_REPO). Skipping GitLab upload."
            exit 0
          fi

          BRANCH="${{ steps.branch.outputs.target_branch }}"
          REMOTE="https://${GL_USER}:${GL_TOKEN}@gitlab.com/${GL_USER}/${GL_REPO}.git"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd /tmp/final_dump

          git init -b "$BRANCH" 2>/dev/null || { git init; git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH" 2>/dev/null || true; }
          git remote add gitlab "$REMOTE" 2>/dev/null || git remote set-url gitlab "$REMOTE"

          find . -type f -name '*.apk' -size +100M -delete 2>/dev/null || true

          git add -A
          git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" 2>/dev/null || echo "Nothing new to commit"

          for i in 1 2 3; do
            git push gitlab "$BRANCH" --force && echo "GitLab push succeeded." && break || {
              echo "GitLab push attempt $i failed."
              sleep 5
            }
          done

      - name: Mirror to Gitea / Codeberg
        if: inputs.upload_gitea == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_REPO: ${{ secrets.GITEA_REPO }}
          GITEA_URL: ${{ secrets.GITEA_URL }}
        run: |
          set -e

          GT_TOKEN="${GITEA_TOKEN:-}"
          GT_USER="${GITEA_USERNAME:-}"
          GT_REPO="${GITEA_REPO:-}"
          GT_URL="${GITEA_URL:-}"

          if [ -z "$GT_TOKEN" ] || [ -z "$GT_USER" ] || [ -z "$GT_REPO" ] || [ -z "$GT_URL" ]; then
            echo "WARNING: Gitea secrets missing. Skipping Gitea upload."
            exit 0
          fi

          BRANCH="${{ steps.branch.outputs.target_branch }}"
          REMOTE="${GT_URL}/${GT_USER}/${GT_REPO}.git"
          AUTH_REMOTE="$(echo $REMOTE | sed 's|https://|https://'"$GT_USER"':'"$GT_TOKEN"'@|')"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd /tmp/final_dump

          git init -b "$BRANCH" 2>/dev/null || { git init; git checkout -b "$BRANCH" 2>/dev/null || true; }
          git remote add gitea "$AUTH_REMOTE" 2>/dev/null || git remote set-url gitea "$AUTH_REMOTE"

          find . -type f -name '*.apk' -size +100M -delete 2>/dev/null || true

          git add -A
          git commit -m "dump: $BRANCH [$(date -u '+%Y-%m-%d %H:%M UTC')]" 2>/dev/null || echo "Nothing new to commit"

          for i in 1 2 3; do
            git push gitea "$BRANCH" --force && echo "Gitea push succeeded." && break || {
              echo "Gitea push attempt $i failed."
              sleep 5
            }
          done

      - name: Upload to SourceForge (rsync over SSH)
        if: inputs.upload_sourceforge == 'true'
        env:
          SF_USER: ${{ secrets.SF_USER }}
          SF_PROJECT: ${{ secrets.SF_PROJECT }}
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          set -e

          SF_U="${SF_USER:-}"
          SF_P="${SF_PROJECT:-}"
          SF_K="${SF_SSH_KEY:-}"

          if [ -z "$SF_U" ] || [ -z "$SF_P" ] || [ -z "$SF_K" ]; then
            echo "WARNING: SourceForge secrets missing. Skipping SourceForge upload."
            exit 0
          fi

          BRANCH="${{ steps.branch.outputs.target_branch }}"

          mkdir -p ~/.ssh
          echo "$SF_K" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null || true

          rsync -avz --delete -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no" \
            /tmp/final_dump/ \
            "${SF_U}@frs.sourceforge.net:/home/frs/project/${SF_P}/${BRANCH}/"

          echo "SourceForge upload completed."

      - name: Upload to Cloudflare R2 (S3-compatible)
        if: inputs.upload_r2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -e

          R2_AK="${R2_ACCESS_KEY_ID:-}"
          R2_SK="${R2_SECRET_ACCESS_KEY:-}"
          R2_BK="${R2_BUCKET:-}"
          R2_EP="${R2_ENDPOINT:-}"

          if [ -z "$R2_AK" ] || [ -z "$R2_SK" ] || [ -z "$R2_BK" ] || [ -z "$R2_EP" ]; then
            echo "WARNING: Cloudflare R2 secrets missing. Skipping R2 upload."
            exit 0
          fi

          BRANCH="${{ steps.branch.outputs.target_branch }}"

          if ! command -v aws >/dev/null 2>&1; then
            pip install awscli --quiet
          fi

          export AWS_ACCESS_KEY_ID="$R2_AK"
          export AWS_SECRET_ACCESS_KEY="$R2_SK"
          export AWS_DEFAULT_REGION="auto"

          aws s3 sync /tmp/final_dump/ "s3://${R2_BK}/${BRANCH}/" \
            --endpoint-url "$R2_EP" \
            --no-progress \
            --exclude "*.apk" || true

          echo "Cloudflare R2 upload completed."

      - name: Post Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Complete job
        run: |
          echo "=============================="
          echo " Dump job finished successfully"
          echo "=============================="
          echo "Branch: ${{ steps.branch.outputs.target_branch }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
