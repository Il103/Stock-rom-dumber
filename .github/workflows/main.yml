name: HyperOS ROM Dumper (DumprX -> Branch)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (used exactly as entered)"
        required: true
        type: string
      target_branch:
        description: "Branch to push files (auto = generate from dump info)"
        required: false
        default: "auto"
        type: string
      device_name:
        description: "Device codename fallback"
        required: false
        default: "unknown"
        type: string
      extract_contents:
        description: "Try extracting filesystem contents from images"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      compress_images:
        description: "Compress .img to .img.xz before push"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk
        run: |
          set -e
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git git-lfs curl jq file rsync unzip tar zip \
            python3 python3-pip xz-utils p7zip-full unrar sharutils cabextract \
            brotli liblz4-tool gawk detox cpio rename \
            device-tree-compiler \
            android-sdk-libsparse-utils e2fsprogs e2tools erofs-utils

          if ! command -v uv >/dev/null 2>&1; then
            curl -fsSL https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate URL
        id: input
        run: |
          set -e
          URL='${{ inputs.rom_url }}'
          [ -n "$URL" ] || { echo "ERROR: rom_url is empty"; exit 1; }
          echo "$URL" | grep -qE '^https?://' || { echo "ERROR: rom_url must start with http/https"; exit 1; }
          echo "rom_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL exactly: $URL"

      - name: Clone DumprX
        run: |
          set -e
          rm -rf /tmp/DumprX
          git clone --depth=1 https://github.com/DumprX/DumprX.git /tmp/DumprX

      - name: Run DumprX with exact URL
        run: |
          set +e
          cd /tmp/DumprX
          chmod +x dumper.sh setup.sh
          export TERM=xterm

          ./dumper.sh '${{ steps.input.outputs.rom_url }}'
          code=$?

          if [ "$code" -ne 0 ]; then
            if [ -d /tmp/DumprX/out ] && [ -n "$(find /tmp/DumprX/out -type f | head -n1)" ]; then
              echo "DumprX returned non-zero but output exists. Continuing."
            else
              echo "DumprX failed and no output found."
              exit "$code"
            fi
          fi

      - name: Collect output
        run: |
          set -e
          mkdir -p /tmp/final_dump
          [ -d /tmp/DumprX/out ] || { echo "ERROR: /tmp/DumprX/out missing"; exit 1; }
          rsync -a /tmp/DumprX/out/ /tmp/final_dump/

          {
            echo "rom_url=${{ steps.input.outputs.rom_url }}"
            echo "target_branch_input=${{ inputs.target_branch }}"
            echo "device_name_input=${{ inputs.device_name }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "dumped_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > /tmp/final_dump/_dump_info.txt

      - name: Resolve target branch
        id: branch
        run: |
          set -e
          sanitize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//'
          }

          input='${{ inputs.target_branch }}'
          if [ -n "$input" ] && [ "$input" != "auto" ]; then
            out=$(sanitize "$input")
          else
            readme=/tmp/final_dump/README.md
            brand=$(awk -F': ' '/^- Brand:/{print $2; exit}' "$readme" 2>/dev/null || true)
            code=$(awk -F': ' '/^- Codename:/{print $2; exit}' "$readme" 2>/dev/null || true)
            incr=$(awk -F': ' '/^- Incremental:/{print $2; exit}' "$readme" 2>/dev/null || true)
            [ -n "$brand" ] || brand=stock
            [ -n "$code" ] || code='${{ inputs.device_name }}'
            out=$(sanitize "dump-$brand-$code-$incr")
          fi

          [ -n "$out" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"
          [ "$out" != "main" ] || out="dumps-$(date +%Y%m%d-%H%M%S)"

          echo "target_branch=$out" >> "$GITHUB_OUTPUT"
          echo "target_branch_resolved=$out" >> /tmp/final_dump/_dump_info.txt
          echo "Resolved branch: $out"

      - name: Recovery fallback from vendor_boot
        run: |
          set -e
          if ! find /tmp/final_dump -type f -iname 'recovery.img' | grep -q .; then
            vb=$(find /tmp/final_dump -type f -iname 'vendor_boot*.img' | head -n1 || true)
            if [ -n "$vb" ] && [ -f "$vb" ]; then
              cp "$vb" /tmp/final_dump/recovery_from_vendor_boot.img
              echo "recovery_fallback=vendor_boot" >> /tmp/final_dump/_dump_info.txt
              echo "recovery_source_file=$(basename "$vb")" >> /tmp/final_dump/_dump_info.txt
            fi
          fi

      - name: Optional compress images
        if: inputs.compress_images == 'true'
        run: |
          set -e
          find /tmp/final_dump -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            xz -T0 -6 "$img"
          done

      - name: Optional extract image contents
        if: inputs.extract_contents == 'true'
        run: |
          set -e
          mkdir -p /tmp/final_dump/extracted
          find /tmp/final_dump -maxdepth 2 -type f -name '*.img' -print0 | while IFS= read -r -d '' img; do
            name=$(basename "$img" .img)
            out=/tmp/final_dump/extracted/$name
            mkdir -p "$out"

            if debugfs -R "rdump / $out" "$img" >/dev/null 2>&1; then
              continue
            fi

            loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
            if [ -n "$loop" ]; then
              mnt=/tmp/mnt_$name
              mkdir -p "$mnt"
              if sudo mount -o ro "$loop" "$mnt" 2>/dev/null; then
                sudo rsync -a "$mnt/" "$out/" || true
                sudo umount "$mnt" 2>/dev/null || true
              fi
              sudo losetup -d "$loop" 2>/dev/null || true
            fi

            sudo chown -R "$USER:$USER" "$out" 2>/dev/null || true
          done

      - name: Push to target branch (smart)
        run: |
          set -e
          BRANCH='${{ steps.branch.outputs.target_branch }}'
          [ -n "$BRANCH" ] || { echo "ERROR: target branch empty"; exit 1; }
          [ "$BRANCH" != "main" ] || { echo "ERROR: target branch cannot be main"; exit 1; }

          git lfs install
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 1048576000
          git config --global core.compression 0

          git fetch origin
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout --orphan "$BRANCH"
          fi

          # Branch root only.
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a /tmp/final_dump/ ./

          # Skip oversized APKs and print skipped names.
          rm -f /tmp/skipped_apk_report.txt
          find . -type f -name '*.apk' -size +100M -print0 | while IFS= read -r -d '' apk; do
            rel=${apk#./}
            sz=$(du -h "$apk" | cut -f1)
            echo "Skipping oversized APK: $rel ($sz)"
            printf '%s | %s\n' "$rel" "$sz" >> /tmp/skipped_apk_report.txt
            rm -f "$apk"
          done

          if [ -f /tmp/skipped_apk_report.txt ]; then
            {
              echo
              echo "## Skipped APKs (>100MB)"
              cat /tmp/skipped_apk_report.txt
            } >> _dump_info.txt
          fi

          # Create LFS rules without heredoc to avoid YAML parsing issues.
          rm -f .gitattributes
          printf '%s\n' '*.img filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.img.xz filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.bin filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.new.dat filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.dat filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.br filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.payload filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.apk filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.apex filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.jar filter=lfs diff=lfs merge=lfs -text' >> .gitattributes
          printf '%s\n' '*.zip filter=lfs diff=lfs merge=lfs -text' >> .gitattributes

          # Safety net for big files.
          find . -type f -size +95M -print0 | while IFS= read -r -d '' f; do
            rel=${f#./}
            printf '%s filter=lfs diff=lfs merge=lfs -text\n' "$rel" >> .gitattributes
          done
          sort -u .gitattributes -o .gitattributes

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          push_retry() {
            tries=5
            n=1
            while [ "$n" -le "$tries" ]; do
              if git push -f origin "$BRANCH"; then
                return 0
              fi
              echo "Push failed ($n/$tries), retry in 15s..."
              sleep 15
              n=$((n + 1))
            done
            return 1
          }

          # Chunked commits for stability.
          git add .gitattributes
          if ! git diff --cached --quiet; then
            git commit -m "dump: lfs rules"
            push_retry
          fi

          for p in *; do
            [ -e "$p" ] || continue
            [ "$p" = ".git" ] && continue
            git add "$p"
            if git diff --cached --quiet; then
              continue
            fi
            git commit -m "dump: add $p"
            push_retry
          done

          git add .
          if ! git diff --cached --quiet; then
            git commit -m "dump: finalize"
            push_retry
          fi

      - name: Job summary
        if: always()
        run: |
          {
            echo "## DumprX Dump Complete"
            echo
            echo "- URL used exactly: \`${{ steps.input.outputs.rom_url }}\`"
            echo "- Target branch: \`${{ steps.branch.outputs.target_branch }}\`"
            echo "- Push mode: same repo, branch root"
            echo "- Release upload: disabled"
            echo

            if [ -d /tmp/final_dump ]; then
              echo "### Top-level files"
              echo '```'
              ls -lah /tmp/final_dump | sed -n '1,200p'
              echo '```'
            fi

            if [ -f /tmp/skipped_apk_report.txt ]; then
              echo
              echo "### Skipped APKs (>100MB)"
              echo '```'
              cat /tmp/skipped_apk_report.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
