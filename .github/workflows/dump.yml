name: DumperX Pro - Ultimate ROM Dumper

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM URL (Needrom / Any Direct Link)"
        required: true
        type: string
      device_codename:
        description: "Device Codename (auto-detect if empty)"
        required: false
        default: ""
        type: string
      telegram_chat_id:
        description: "Telegram Chat ID (for live notifications)"
        required: false
        default: ""
        type: string
      gitgud_token:
        description: "GitGud.io Personal Access Token"
        required: false
        default: ""
        type: string
      upload_target:
        description: "Upload Target: github, gitgud, or both"
        required: false
        default: "both"
        type: string
      generate_device_tree:
        description: "Generate Device Tree (true/false)"
        required: false
        default: "false"
        type: string
      generate_recovery_tree:
        description: "Generate Recovery Tree (true/false)"
        required: false
        default: "false"
        type: string
      recovery_branch:
        description: "Recovery Branch: twrp, pbrp, orangefox, shrp, ofrp"
        required: false
        default: "twrp"
        type: string
      recovery_boot_source:
        description: "Recovery Boot Source: auto, recovery, vendor_boot, boot"
        required: false
        default: "auto"
        type: string
      generate_kernel_tree:
        description: "Generate Kernel Tree (true/false)"
        required: false
        default: "false"
        type: string
      generate_all_trees:
        description: "Generate ALL Trees (true/false)"
        required: false
        default: "false"
        type: string
      github_tree_token:
        description: "GitHub Token for Tree Repos"
        required: false
        default: ""
        type: string
      use_aria2c:
        description: "Use aria2c downloader (true/false)"
        required: false
        default: "true"
        type: string
      compress_images:
        description: "Compress .img to .img.xz (true/false)"
        required: false
        default: "false"
        type: string
      extract_contents:
        description: "Extract filesystem contents (true/false)"
        required: false
        default: "false"
        type: string
      split_large_files:
        description: "Split files >100MB for GitHub (true/false)"
        required: false
        default: "true"
        type: string

env:
  TG_BOT_TOKEN: "8727385860:AAEmuxNgv4fG7J6hNFXLJri-qpyyJ4eN-ao"
  DUMP_DIR: /tmp/dump_output
  ROM_DIR: /tmp/rom_download
  TG_MSG_FILE: /tmp/tg_msg_id

jobs:
  dump-rom:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ultra Environment
        run: |
          chmod +x .github/scripts/*.sh
          bash .github/scripts/00_setup.sh
          echo "SETUP_COMPLETE=true" >> $GITHUB_ENV

      - name: Telegram Job Started
        if: github.event.inputs.telegram_chat_id != ''
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: |
          python3 .github/scripts/03_telegram.py start             "DumperX Pro Started"             "URL: ${{ github.event.inputs.rom_url }}"             "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Free Disk Space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc             /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup             "$AGENT_TOOLSDIRECTORY" /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get clean -qq || true
          sudo docker image prune --all --force 2>/dev/null || true
          sudo snap list 2>/dev/null | awk '{print $1}' | grep -v Name | xargs -I{} sudo snap remove {} 2>/dev/null || true
          df -h /

      - name: Download ROM
        id: download
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: |
          bash .github/scripts/01_download.sh "${{ github.event.inputs.rom_url }}" "${{ env.ROM_DIR }}" "${{ github.event.inputs.use_aria2c }}"
          ROM_FILE=$(ls -t ${{ env.ROM_DIR }}/*.* 2>/dev/null | head -1 || echo "")
          echo "rom_file=$ROM_FILE" >> $GITHUB_OUTPUT
          echo "rom_filename=$(basename "$ROM_FILE")" >> $GITHUB_OUTPUT

      - name: Run DumprX Dump
        id: dump
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: |
          bash .github/scripts/02_dump.sh "${{ steps.download.outputs.rom_file }}" "${{ env.DUMP_DIR }}"

          README="${{ env.DUMP_DIR }}/README.md"
          BRAND=$(awk -F': ' '/^- Brand:/{print $2; exit}' "$README" 2>/dev/null || echo "Unknown")
          CODE=$(awk -F': ' '/^- Codename:/{print $2; exit}' "$README" 2>/dev/null || echo "${{ github.event.inputs.device_codename }}")
          INCR=$(awk -F': ' '/^- Incremental:/{print $2; exit}' "$README" 2>/dev/null || echo "unknown")

          [ -n "$CODE" ] || CODE="${{ github.event.inputs.device_codename }}"
          [ -n "$CODE" ] || CODE="unknown"

          CODE=$(echo "$CODE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')
          BRAND=$(echo "$BRAND" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g')

          echo "device_brand=$BRAND" >> $GITHUB_OUTPUT
          echo "device_codename=$CODE" >> $GITHUB_OUTPUT
          echo "device_incremental=$INCR" >> $GITHUB_OUTPUT
          echo "dump_branch=dump-$BRAND-$CODE-$INCR" >> $GITHUB_OUTPUT

      - name: Post-Process Images
        if: github.event.inputs.compress_images == 'true' || github.event.inputs.extract_contents == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: |
          if [ "${{ github.event.inputs.compress_images }}" = "true" ]; then
            echo "Compressing images..."
            find ${{ env.DUMP_DIR }} -maxdepth 2 -type f -name "*.img" -print0 |               while IFS= read -r -d '' img; do
                xz -T0 -6 -v "$img" && rm -f "$img"
              done
          fi

          if [ "${{ github.event.inputs.extract_contents }}" = "true" ]; then
            echo "Extracting filesystem contents..."
            mkdir -p ${{ env.DUMP_DIR }}/extracted
            find ${{ env.DUMP_DIR }} -maxdepth 2 -type f -name "*.img" -print0 |               while IFS= read -r -d '' img; do
                name=$(basename "$img" .img)
                out="${{ env.DUMP_DIR }}/extracted/$name"
                mkdir -p "$out"

                if debugfs -R "rdump / $out" "$img" >/dev/null 2>&1; then
                  continue
                fi

                loop=$(sudo losetup -f --show "$img" 2>/dev/null || true)
                if [ -n "$loop" ]; then
                  mnt="/tmp/mnt_$name"
                  mkdir -p "$mnt"
                  if sudo mount -o ro "$loop" "$mnt" 2>/dev/null; then
                    sudo rsync -a "$mnt/" "$out/" || true
                    sudo umount "$mnt" 2>/dev/null || true
                  fi
                  sudo losetup -d "$loop" 2>/dev/null || true
                fi

                sudo chown -R "$USER:$USER" "$out" 2>/dev/null || true
              done
          fi

      - name: Recovery Fallback
        run: |
          if [ ! -f "${{ env.DUMP_DIR }}/recovery.img" ] && [ ! -f "${{ env.DUMP_DIR }}/recovery.img.xz" ]; then
            vb=$(find ${{ env.DUMP_DIR }} -maxdepth 2 -type f -iname 'vendor_boot*.img*' | head -n1 || true)
            if [ -n "$vb" ] && [ -f "$vb" ]; then
              cp "$vb" "${{ env.DUMP_DIR }}/recovery_from_vendor_boot.img"
              echo "recovery_fallback=vendor_boot" >> ${{ env.DUMP_DIR }}/_dump_info.txt
            fi
          fi

      - name: Upload Dump
        id: upload
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
          GITGUD_TOKEN: ${{ github.event.inputs.gitgud_token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRAND: ${{ steps.dump.outputs.device_brand }}
          CODE: ${{ steps.dump.outputs.device_codename }}
          BRANCH: ${{ steps.dump.outputs.dump_branch }}
        run: |
          bash .github/scripts/04_upload.sh             "${{ env.DUMP_DIR }}"             "${{ github.event.inputs.upload_target }}"             "${{ env.BRANCH }}"             "${{ env.BRAND }}"             "${{ env.CODE }}"             "${{ github.event.inputs.split_large_files }}"

      - name: Generate Trees
        if: github.event.inputs.generate_device_tree == 'true' || github.event.inputs.generate_recovery_tree == 'true' || github.event.inputs.generate_kernel_tree == 'true' || github.event.inputs.generate_all_trees == 'true'
        id: trees
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
          GITHUB_TOKEN: ${{ github.event.inputs.github_tree_token != '' && github.event.inputs.github_tree_token || secrets.GITHUB_TOKEN }}
          BRAND: ${{ steps.dump.outputs.device_brand }}
          CODE: ${{ steps.dump.outputs.device_codename }}
          RECOVERY_BRANCH: ${{ github.event.inputs.recovery_branch }}
          RECOVERY_BOOT_SOURCE: ${{ github.event.inputs.recovery_boot_source }}
        run: |
          bash .github/scripts/05_trees.sh             "${{ env.DUMP_DIR }}"             "${{ env.BRAND }}"             "${{ env.CODE }}"             "${{ github.event.inputs.generate_all_trees }}"             "${{ github.event.inputs.generate_device_tree }}"             "${{ github.event.inputs.generate_recovery_tree }}"             "${{ github.event.inputs.generate_kernel_tree }}"             "${{ env.RECOVERY_BRANCH }}"             "${{ env.RECOVERY_BOOT_SOURCE }}"

      - name: Full Verification Check
        id: check
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
          DUMP_DIR: ${{ env.DUMP_DIR }}
        run: |
          bash .github/scripts/06_check.sh "${{ env.DUMP_DIR }}" "${{ steps.dump.outputs.device_codename }}"
          cat /tmp/check_report.md >> $GITHUB_STEP_SUMMARY || true

      - name: Telegram Final Report
        if: github.event.inputs.telegram_chat_id != '' && always()
        env:
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: |
          STATUS="${{ job.status }}"
          BRANCH="${{ steps.dump.outputs.dump_branch }}"
          BRAND="${{ steps.dump.outputs.device_brand }}"
          CODE="${{ steps.dump.outputs.device_codename }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="OK"
            MSG="DumperX Complete!"
          else
            EMOJI="FAIL"
            MSG="DumperX Failed!"
          fi

          GITHUB_URL="${{ github.server_url }}/${{ github.repository }}/tree/${BRANCH}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python3 .github/scripts/03_telegram.py final             "$EMOJI $MSG"             "Brand: $BRAND"             "Codename: $CODE"             "Branch: $BRANCH"             "$RUN_URL"             "$GITHUB_URL"

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## DumperX Pro - Results"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| ROM URL | ${{ github.event.inputs.rom_url }} |"
            echo "| Device | ${{ steps.dump.outputs.device_brand }} / ${{ steps.dump.outputs.device_codename }} |"
            echo "| Branch | ${{ steps.dump.outputs.dump_branch }} |"
            echo "| Status | ${{ job.status }} |"
            echo "| Upload | ${{ github.event.inputs.upload_target }} |"
            echo "| Trees | Device:${{ github.event.inputs.generate_device_tree }} Recovery:${{ github.event.inputs.generate_recovery_tree }}(${{ github.event.inputs.recovery_branch }}) Kernel:${{ github.event.inputs.generate_kernel_tree }} All:${{ github.event.inputs.generate_all_trees }} |"
            echo ""

            if [ -f /tmp/check_report.md ]; then
              echo "---"
              cat /tmp/check_report.md
            fi

            if [ -d ${{ env.DUMP_DIR }} ]; then
              echo ""
              echo "### Dump Contents"
              echo '\`\`\`'
              find ${{ env.DUMP_DIR }} -maxdepth 2 -type f -exec ls -lh {} + | head -50
              echo '\`\`\`'
            fi
          } >> $GITHUB_STEP_SUMMARY
